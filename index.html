<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PROJECT DARKSTATE</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Courier New", monospace;
}

body{
    background:black;
    color:#00ff88;
    overflow:hidden;
    height:100vh;
}

/* SMALLER BACKGROUND IMAGE */
.bg-image{
    position:fixed;
    inset:0;
    background:
        url('https://operator.coolsquad.xyz/u/YYTRKF.png')
        center center / 500px auto no-repeat;
    opacity:0;
    transition:opacity 1s ease;
    z-index:-3;
}

.bg-image.active{
    opacity:0.07;
}

/* SCANLINES */
.scanlines{
    position:fixed;
    inset:0;
    pointer-events:none;
    z-index:-1;

    background:
        repeating-linear-gradient(
            to bottom,
            rgba(255,255,255,0.03),
            rgba(255,255,255,0.03) 1px,
            transparent 1px,
            transparent 3px
        );

    animation:scanMove 7s linear infinite;
}

@keyframes scanMove{
    from{
        background-position:0 0;
    }
    to{
        background-position:0 100px;
    }
}

/* TERMINAL */
.terminal{
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    height:100vh;
    padding:20px;
}

.output{
    overflow-y:auto;
    white-space:pre-wrap;
    padding-bottom:20px;
}

.line{
    margin-bottom:8px;
}

.system{
    color:#88ffcc;
}

.error{
    color:#ff5555;
}

.success{
    color:#7dff7d;
}

.database-link{
    display:block;
    color:#6ecfff;
    margin-top:6px;
    text-decoration:none;
}

.database-link:hover{
    text-decoration:underline;
}

/* TOP INFO */
.top-info{
    margin-bottom:20px;
}

.title{
    font-size:28px;
    margin-bottom:10px;
    text-shadow:0 0 10px #00ff88;
}

.subtitle{
    color:#85ffbe;
    margin-bottom:5px;
}

.clock{
    color:#73d0a3;
    margin-top:8px;
}

/* INPUT BAR */
.input-area{
    border-top:1px solid #00ff88;
    padding-top:12px;
    display:flex;
    align-items:center;
    gap:10px;
}

.prefix{
    color:#00ff88;
    white-space:nowrap;
}

#commandInput{
    flex:1;
    background:transparent;
    border:none;
    outline:none;
    color:#00ff88;
    font-size:16px;
}

.cursor{
    width:10px;
    height:18px;
    background:#00ff88;
    animation:blink 1s infinite;
}

@keyframes blink{
    50%{
        opacity:0;
    }
}
</style>
</head>
<body>

<div class="bg-image" id="bgImage"></div>
<div class="scanlines"></div>

<div class="terminal">

    <div class="output" id="output">

        <div class="top-info">
            <div class="title">PROJECT DARKSTATE DATABASE</div>

            <div class="subtitle" id="loginStatus">
                You're logged in as "Guest"
            </div>

            <div class="subtitle" id="researchText"></div>

            <div class="clock" id="clock"></div>
        </div>

        <div class="line system">
            Welcome to the Project Darkstate Database
        </div>

        <div class="line">
            Type "help" to begin.
        </div>

    </div>

    <div class="input-area">
        <span class="prefix" id="prefix">[ Guest@s80.host : ~ ]</span>

        <input
            type="text"
            id="commandInput"
            autocomplete="off"
            autofocus
        >

        <div class="cursor"></div>
    </div>

</div>

<script>
const output = document.getElementById("output");
const input = document.getElementById("commandInput");
const prefix = document.getElementById("prefix");
const loginStatus = document.getElementById("loginStatus");
const researchText = document.getElementById("researchText");
const bgImage = document.getElementById("bgImage");

let loggedIn = false;
let username = "Guest";

/* LOGIN STATES */
let loginMode = false;
let passwordMode = false;
let tempUsername = "";

/* CLOCK */
function updateClock(){

    const now = new Date();

    const formatted =
        now.toLocaleDateString() +
        " | " +
        now.toLocaleTimeString();

    document.getElementById("clock").innerText = formatted;
}

setInterval(updateClock, 1000);
updateClock();

/* OUTPUT */
function addLine(text, className=""){

    const div = document.createElement("div");

    div.className = "line " + className;

    div.innerHTML = text;

    output.appendChild(div);

    output.scrollTop = output.scrollHeight;
}

/* UI UPDATE */
function updateUI(){

    prefix.textContent =
        `[ ${username}@s80.host : ~ ]`;

    loginStatus.innerHTML =
        `You're logged in as "${username}"`;

    if(loggedIn){

        researchText.innerHTML =
            "Expeditionary Projects - Research Section";

        bgImage.classList.add("active");

    } else {

        researchText.innerHTML = "";

        bgImage.classList.remove("active");
    }
}

/* HELP */
function showHelp(){

    if(!loggedIn){

        addLine(`
Available Commands:
- help
- login
        `, "system");

    } else {

        addLine(`
Available Commands:
- help
- logout
- database
        `, "system");
    }
}

/* DATABASE */
function showDatabase(){

    addLine(
        "ACCESSING ARTIFACT DATABASE...",
        "success"
    );

    const links = [

        {
            name:"Artifact 001 - The Monolith",
            page:"artifact-001.html"
        },

        {
            name:"Artifact 002 - Special Roots",
            page:"artifact-002.html"
        },

        {
            name:"Artifact 003 - The Church",
            page:"artifact-003.html"
        },

        {
            name:"Artifact 004 - Special Roots",
            page:"artifact-004.html"
        },
        
         {
            name:"Artifact 005 - Red Box",
            page:"artifact-005.html"
        }
    ];

    links.forEach(link => {

        addLine(`
            <a class="database-link" href="${link.page}">
                ${link.name}
            </a>
        `);
    });
}

/* COMMAND INPUT */
input.addEventListener("keydown", function(e){

    if(e.key !== "Enter") return;

    const command = input.value.trim();

    addLine(
        `<span style="color:#00ff88">${prefix.textContent}</span> ${command}`
    );

    /* LOGIN USERNAME STEP */
    if(loginMode){

        tempUsername = command;

        loginMode = false;
        passwordMode = true;

        addLine("ENTER PASSWORD:", "system");

        input.value = "";
        return;
    }

    /* PASSWORD STEP */
    if(passwordMode){

        passwordMode = false;

        const enteredPassword = command;

        if(
            tempUsername === "EP1EXPROEXL" &&
            enteredPassword === "fatchud123"
        ){

            loggedIn = true;
            username = tempUsername;

            updateUI();

            addLine(
                "AUTHENTICATION SUCCESSFUL",
                "success"
            );

            addLine(
                "ACCESS GRANTED",
                "success"
            );

        } else {

            addLine(
                "ACCESS DENIED",
                "error"
            );
        }

        input.value = "";
        return;
    }

    const lower = command.toLowerCase();

    /* BEFORE LOGIN */
    if(!loggedIn){

        switch(lower){

            case "help":
                showHelp();
                break;

            case "login":

                loginMode = true;

                addLine(
                    "ENTER USERNAME:",
                    "system"
                );

                break;

            default:

                addLine(
                    "UNKNOWN COMMAND",
                    "error"
                );
        }

    }

    /* AFTER LOGIN */
    else {

        switch(lower){

            case "help":
                showHelp();
                break;

            case "logout":

                loggedIn = false;
                username = "Guest";

                updateUI();

                addLine(
                    "SESSION TERMINATED",
                    "error"
                );

                break;

            case "database":
                showDatabase();
                break;

            default:

                addLine(
                    "UNKNOWN COMMAND",
                    "error"
                );
        }
    }

    input.value = "";
});

updateUI();
</script>

</body>
</html>
