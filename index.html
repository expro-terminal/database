<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PROJECT DARKSTATE</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Courier New", monospace;
}

body{
    background:black;
    color:#00ff88;
    overflow:hidden;
    height:100vh;
}

/* SMALLER BACKGROUND IMAGE */
.bg-image{
    position:fixed;
    inset:0;
    background:url('https://operator.coolsquad.xyz/u/CBkG4n.png')
    center center / 35% no-repeat;
    opacity:0;
    transition:opacity 1s ease;
    z-index:-3;
    filter:brightness(0.8);
}

.bg-image.active{
    opacity:0.10;
}

/* SCANLINES */
.scanlines{
    position:fixed;
    inset:0;
    pointer-events:none;
    z-index:-1;

    background:
    repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,0.03),
        rgba(255,255,255,0.03) 1px,
        transparent 1px,
        transparent 3px
    );

    animation:scanMove 8s linear infinite;
}

@keyframes scanMove{
    from{
        background-position:0 0;
    }

    to{
        background-position:0 100px;
    }
}

/* TERMINAL */
.terminal{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    padding:20px;
}

.output{
    overflow-y:auto;
    padding-bottom:20px;
    white-space:pre-wrap;
}

.line{
    margin-bottom:8px;
}

.system{
    color:#7dffb5;
}

.error{
    color:#ff5c5c;
}

.success{
    color:#76ff76;
}

.database-link{
    display:block;
    color:#6ed6ff;
    text-decoration:none;
    margin-top:6px;
}

.database-link:hover{
    text-decoration:underline;
}

.top-info{
    margin-bottom:20px;
}

.title{
    font-size:28px;
    margin-bottom:10px;
    text-shadow:0 0 10px #00ff88;
}

.subtitle{
    margin-bottom:8px;
    color:#88ffc3;
}

.clock{
    color:#77dba6;
}

/* COMMAND BAR */
.input-area{
    border-top:1px solid #00ff88;
    padding-top:12px;
    display:flex;
    align-items:center;
    gap:10px;
}

.prefix{
    white-space:nowrap;
}

#commandInput{
    flex:1;
    background:transparent;
    border:none;
    outline:none;
    color:#00ff88;
    font-size:16px;
}

.cursor{
    width:10px;
    height:18px;
    background:#00ff88;
    animation:blink 1s infinite;
}

@keyframes blink{
    50%{
        opacity:0;
    }
}
</style>
</head>

<body>

<div class="bg-image" id="bgImage"></div>
<div class="scanlines"></div>

<div class="terminal">

    <div class="output" id="output">

        <div class="top-info">
            <div class="title">
                PROJECT DARKSTATE DATABASE
            </div>

            <div class="subtitle" id="loginStatus">
                You're logged in as "Guest"
            </div>

            <div class="subtitle" id="sectionText"></div>

            <div class="clock" id="clock"></div>
        </div>

        <div class="line system">
            Welcome to the Project Darkstate Database
        </div>

        <div class="line">
            Type "help" for available commands.
        </div>

    </div>

    <div class="input-area">
        <span class="prefix" id="prefix">
            [ Guest@s80.host : ~ ]
        </span>

        <input type="text" id="commandInput" autocomplete="off" autofocus />

        <div class="cursor"></div>
    </div>

</div>

<script>
const output = document.getElementById("output");
const input = document.getElementById("commandInput");
const prefix = document.getElementById("prefix");
const loginStatus = document.getElementById("loginStatus");
const sectionText = document.getElementById("sectionText");
const bgImage = document.getElementById("bgImage");

let loggedIn = false;
let username = "Guest";

/* CLOCK */
function updateClock(){

    const now = new Date();

    document.getElementById("clock").innerText =
        now.toLocaleDateString() +
        " | " +
        now.toLocaleTimeString();
}

setInterval(updateClock, 1000);
updateClock();

/* OUTPUT */
function addLine(text, className=""){

    const div = document.createElement("div");

    div.className = "line " + className;
    div.innerHTML = text;

    output.appendChild(div);

    output.scrollTop = output.scrollHeight;
}

/* UI UPDATE */
function updateUI(){

    prefix.textContent = `[ ${username}@s80.host : ~ ]`;

    loginStatus.innerHTML =
        `You're logged in as "${username}"`;

    if(loggedIn){

        sectionText.innerHTML =
            "Expeditionary Projects - Research Section";

        bgImage.classList.add("active");

    } else {

        sectionText.innerHTML = "";

        bgImage.classList.remove("active");
    }
}

/* HELP */
function showHelp(){

    if(!loggedIn){

        addLine(`
Available Commands:
- help
- login USERNAME PASSWORD

Example:
login EP1EXPROEXL fatchud123
        `, "system");

    } else {

        addLine(`
Available Commands:
- help
- logout
- database
        `, "system");
    }
}

/* DATABASE */
function showDatabase(){

    addLine("OPENING ARTIFACT DATABASE...", "success");

    const artifacts = [
        {
            title:"Artifact 001 - The Hollow Signal",
            page:"artifact-001.html"
        },
        {
            title:"Artifact 002 - Blacksite Echo",
            page:"artifact-002.html"
        },
        {
            title:"Artifact 003 - Janus Protocol",
            page:"artifact-003.html"
        }
    ];

    artifacts.forEach(artifact => {

        addLine(`
<a class="database-link" href="${artifact.page}">
${artifact.title}
</a>
        `);
    });
}

/* COMMANDS */
input.addEventListener("keydown", function(e){

    if(e.key === "Enter"){

        const command = input.value.trim();

        addLine(`
<span style="color:#00ff88">${prefix.textContent}</span> ${command}
        `);

        const parts = command.split(" ");
        const base = parts[0]?.toLowerCase();

        /* BEFORE LOGIN */
        if(!loggedIn){

            switch(base){

                case "help":
                    showHelp();
                    break;

                case "login":

                    const user = parts[1];
                    const pass = parts[2];

                    if(
                        user === "EP1EXPROEXL" &&
                        pass === "fatchud123"
                    ){

                        loggedIn = true;
                        username = user;

                        updateUI();

                        addLine(
                            "AUTHENTICATION SUCCESSFUL",
                            "success"
                        );

                        addLine(
                            "ACCESS GRANTED",
                            "success"
                        );

                    } else {

                        addLine(
                            "INVALID CREDENTIALS",
                            "error"
                        );
                    }

                    break;

                default:

                    addLine(
                        "UNKNOWN COMMAND",
                        "error"
                    );
            }
        }

        /* AFTER LOGIN */
        else {

            switch(base){

                case "help":
                    showHelp();
                    break;

                case "logout":

                    loggedIn = false;
                    username = "Guest";

                    updateUI();

                    addLine(
                        "SESSION TERMINATED",
                        "error"
                    );

                    break;

                case "database":
                    showDatabase();
                    break;

                default:

                    addLine(
                        "UNKNOWN COMMAND",
                        "error"
                    );
            }
        }

        input.value = "";
    }
});

updateUI();
</script>

</body>
</html>
