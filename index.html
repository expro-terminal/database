<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>PROJECT DARKSTATE DATABASE</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Courier New", monospace;
}

body{
    background:black;
    color:#00ff88;
    overflow:hidden;
    height:100vh;
}

/* SMALLER BACKGROUND IMAGE */

.bg-image{
    position:fixed;
    inset:0;

    background:
        url('https://operator.coolsquad.xyz/u/CBkG4n.png')
        center center / 40% no-repeat;

    opacity:0;
    transition:opacity 1s ease;

    z-index:-3;
    filter:brightness(0.8);
}

.bg-image.active{
    opacity:0.06;
}

/* SCANLINES */

.scanlines{
    position:fixed;
    inset:0;

    background:
    repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,0.03),
        rgba(255,255,255,0.03) 1px,
        transparent 1px,
        transparent 3px
    );

    animation:scan 5s linear infinite;

    pointer-events:none;

    z-index:-1;
}

@keyframes scan{
    from{
        background-position:0 0;
    }

    to{
        background-position:0 100px;
    }
}

/* TERMINAL */

.terminal{
    height:100vh;

    display:flex;
    flex-direction:column;
    justify-content:space-between;

    padding:20px;
}

/* CENTER TOP */

.top-info{
    text-align:center;
    margin-top:10px;
    margin-bottom:25px;
}

.main-title{
    font-size:32px;
    margin-bottom:10px;

    text-shadow:0 0 10px #00ff88;
}

.info-line{
    margin-top:5px;
    color:#8effc1;
}

.clock{
    margin-top:8px;
    color:#73d1a0;
}

/* OUTPUT */

.output{
    overflow-y:auto;
    flex:1;
    white-space:pre-wrap;
    padding-bottom:20px;
}

.line{
    margin-bottom:8px;
}

.system{
    color:#74ffb0;
}

.error{
    color:#ff4d4d;
}

.success{
    color:#9dff9d;
}

/* DATABASE LINKS */

.database-link{
    display:block;
    margin-top:8px;
    color:#6ed6ff;
    text-decoration:none;
}

.database-link:hover{
    text-decoration:underline;
}

/* INPUT BAR */

.input-area{
    border-top:1px solid #00ff88;
    padding-top:12px;

    display:flex;
    align-items:center;
    gap:10px;
}

.prefix{
    white-space:nowrap;
}

#commandInput{
    flex:1;

    background:transparent;
    border:none;
    outline:none;

    color:#00ff88;
    font-size:16px;
}

.cursor{
    width:10px;
    height:18px;
    background:#00ff88;

    animation:blink 1s infinite;
}

@keyframes blink{
    50%{
        opacity:0;
    }
}

</style>
</head>

<body>

<div class="bg-image" id="bgImage"></div>
<div class="scanlines"></div>

<div class="terminal">

    <!-- TOP INFO -->

    <div class="top-info">

        <div class="main-title">
            PROJECT DARKSTATE DATABASE
        </div>

        <div class="info-line" id="loginStatus">
            You're logged in as "Guest"
        </div>

        <div class="info-line" id="researchText"></div>

        <div class="clock" id="clock"></div>

    </div>

    <!-- TERMINAL OUTPUT -->

    <div class="output" id="output">

        <div class="line system">
            Welcome to the Project Darkstate Database
        </div>

        <div class="line">
            Type "help" to begin.
        </div>

    </div>

    <!-- INPUT -->

    <div class="input-area">

        <span class="prefix" id="prefix">
            [ Guest@s80.host : ~ ]
        </span>

        <input type="text" id="commandInput" autocomplete="off" autofocus>

        <div class="cursor"></div>

    </div>

</div>

<script>

const output = document.getElementById("output");
const input = document.getElementById("commandInput");

const prefix = document.getElementById("prefix");

const loginStatus = document.getElementById("loginStatus");
const researchText = document.getElementById("researchText");

const bgImage = document.getElementById("bgImage");

let loggedIn = false;
let username = "Guest";

/* CLOCK */

function updateClock(){

    const now = new Date();

    const timeString =
        now.toLocaleDateString() +
        " | " +
        now.toLocaleTimeString();

    document.getElementById("clock").innerText = timeString;
}

setInterval(updateClock, 1000);
updateClock();

/* ADD OUTPUT */

function addLine(text, className=""){

    const div = document.createElement("div");

    div.className = "line " + className;

    div.innerHTML = text;

    output.appendChild(div);

    output.scrollTop = output.scrollHeight;
}

/* UPDATE UI */

function updateUI(){

    prefix.innerText = `[ ${username}@s80.host : ~ ]`;

    loginStatus.innerHTML =
        `You're logged in as "${username}"`;

    if(loggedIn){

        researchText.innerHTML =
            "Expeditionary Projects - Research Section";

        bgImage.classList.add("active");

    } else {

        researchText.innerHTML = "";

        bgImage.classList.remove("active");
    }
}

/* HELP */

function showHelp(){

    if(!loggedIn){

        addLine(`
Available Commands:

help
login USERNAME PASSWORD
        `, "system");

    } else {

        addLine(`
Available Commands:

help
logout
database
        `, "system");
    }
}

/* DATABASE */

function showDatabase(){

    addLine("ACCESSING ARTIFACT DATABASE...", "success");

    const artifacts = [

        {
            name:"Artifact 001 - The Hollow Signal",
            link:"artifact-001.html"
        },

        {
            name:"Artifact 002 - Blacksite Echo",
            link:"artifact-002.html"
        },

        {
            name:"Artifact 003 - The Janus File",
            link:"artifact-003.html"
        }

    ];

    artifacts.forEach(item => {

        addLine(`
<a class="database-link" href="${item.link}">
${item.name}
</a>
        `);
    });
}

/* COMMANDS */

input.addEventListener("keydown", function(e){

    if(e.key === "Enter"){

        const command = input.value.trim();

        addLine(`
<span style="color:#00ff88">
${prefix.innerText}
</span> ${command}
        `);

        const parts = command.split(" ");

        const baseCommand = parts[0]?.toLowerCase();

        /* BEFORE LOGIN */

        if(!loggedIn){

            switch(baseCommand){

                case "help":

                    showHelp();

                    break;

                case "login":

                    const user = parts[1];
                    const pass = parts[2];

                    if(
                        user === "EP1EXPROEXL" &&
                        pass === "fatchud123"
                    ){

                        loggedIn = true;

                        username = user;

                        updateUI();

                        addLine(
                            "AUTHENTICATION SUCCESSFUL",
                            "success"
                        );

                        addLine(
                            "ACCESS GRANTED",
                            "success"
                        );

                    } else {

                        addLine(
                            "INVALID CREDENTIALS",
                            "error"
                        );
                    }

                    break;

                default:

                    addLine(
                        "UNKNOWN COMMAND",
                        "error"
                    );
            }

        }

        /* AFTER LOGIN */

        else {

            switch(baseCommand){

                case "help":

                    showHelp();

                    break;

                case "logout":

                    loggedIn = false;

                    username = "Guest";

                    updateUI();

                    addLine(
                        "SESSION TERMINATED",
                        "error"
                    );

                    break;

                case "database":

                    showDatabase();

                    break;

                default:

                    addLine(
                        "UNKNOWN COMMAND",
                        "error"
                    );
            }
        }

        input.value = "";
    }
});

updateUI();

</script>

</body>
</html>
