<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PROJECT DARKSTATE</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family: "Courier New", monospace;
    }

    body{
        background:#000;
        color:#00ff88;
        overflow:hidden;
        height:100vh;
    }

    /* BACKGROUND IMAGE */
    .bg-image{
        position:fixed;
        inset:0;
        background:url('https://operator.coolsquad.xyz/u/YYTRKF.png') center/cover;
        opacity:0;
        transition:opacity 1s ease;
        z-index:-3;
    }

    .bg-image.active{
        opacity:0.08;
    }

    /* SCANLINES */
    .scanlines{
        position:fixed;
        inset:0;
        pointer-events:none;
        z-index:-1;
        background:
            repeating-linear-gradient(
                to bottom,
                rgba(255,255,255,0.03),
                rgba(255,255,255,0.03) 1px,
                transparent 1px,
                transparent 3px
            );
        animation:scanMove 6s linear infinite;
    }

    @keyframes scanMove{
        from{
            background-position:0 0;
        }
        to{
            background-position:0 100px;
        }
    }

    /* TERMINAL */
    .terminal{
        height:100vh;
        display:flex;
        flex-direction:column;
        justify-content:space-between;
        padding:20px;
    }

    .output{
        overflow-y:auto;
        padding-bottom:20px;
        white-space:pre-wrap;
    }

    .line{
        margin-bottom:8px;
    }

    .system{
        color:#00ffaa;
    }

    .error{
        color:#ff4d4d;
    }

    .success{
        color:#7dff7d;
    }

    .database-link{
        display:block;
        color:#6ed6ff;
        text-decoration:none;
        margin-top:6px;
    }

    .database-link:hover{
        text-decoration:underline;
    }

    /* INPUT BAR */
    .input-area{
        border-top:1px solid #00ff88;
        padding-top:12px;
        display:flex;
        align-items:center;
        gap:10px;
    }

    .prefix{
        color:#00ff88;
        white-space:nowrap;
    }

    #commandInput{
        flex:1;
        background:transparent;
        border:none;
        outline:none;
        color:#00ff88;
        font-size:16px;
    }

    .cursor{
        display:inline-block;
        width:10px;
        background:#00ff88;
        animation:blink 1s infinite;
        margin-left:3px;
    }

    @keyframes blink{
        50%{
            opacity:0;
        }
    }

    .top-info{
        margin-bottom:20px;
    }

    .title{
        font-size:28px;
        margin-bottom:10px;
        text-shadow:0 0 10px #00ff88;
    }

    .subtitle{
        color:#84ffbd;
        margin-bottom:8px;
    }

    .clock{
        color:#74d6a5;
        margin-top:5px;
    }
</style>
</head>
<body>

<div class="bg-image" id="bgImage"></div>
<div class="scanlines"></div>

<div class="terminal">

    <div class="output" id="output">

        <div class="top-info">
            <div class="title">PROJECT DARKSTATE DATABASE</div>
            <div class="subtitle" id="loginStatus">You're logged in as "Guest"</div>
            <div class="subtitle" id="expeditionText"></div>
            <div class="clock" id="clock"></div>
        </div>

        <div class="line system">
            Welcome to the Project Darkstate Database
        </div>

        <div class="line">
            Type "help" to begin.
        </div>

    </div>

    <div class="input-area">
        <span class="prefix" id="prefix">[ Guest@s80.host : ~ ]</span>
        <input type="text" id="commandInput" autofocus autocomplete="off">
        <span class="cursor"></span>
    </div>

</div>

<script>
    const output = document.getElementById("output");
    const input = document.getElementById("commandInput");
    const prefix = document.getElementById("prefix");
    const loginStatus = document.getElementById("loginStatus");
    const expeditionText = document.getElementById("expeditionText");
    const bgImage = document.getElementById("bgImage");

    let loggedIn = false;
    let username = "Guest";

    // CLOCK
    function updateClock(){
        const now = new Date();

        const formatted =
            now.toLocaleDateString() + " | " +
            now.toLocaleTimeString();

        document.getElementById("clock").innerText = formatted;
    }

    setInterval(updateClock, 1000);
    updateClock();

    // ADD OUTPUT
    function addLine(text, className=""){
        const div = document.createElement("div");
        div.className = "line " + className;
        div.innerHTML = text;
        output.appendChild(div);

        output.scrollTop = output.scrollHeight;
    }

    // UPDATE UI
    function updateUI(){
        prefix.textContent = `[ ${username}@s80.host : ~ ]`;
        loginStatus.innerHTML = `You're logged in as "${username}"`;

        if(loggedIn){
            expeditionText.innerHTML = "Expeditionary Projects";
            bgImage.classList.add("active");
        } else {
            expeditionText.innerHTML = "";
            bgImage.classList.remove("active");
        }
    }

    // HELP
    function showHelp(){
        if(!loggedIn){
            addLine(`
Available Commands:
- help
- login
            `, "system");
        } else {
            addLine(`
Available Commands:
- help
- logout
- database
            `, "system");
        }
    }

    // DATABASE
    function showDatabase(){
        addLine("ACCESSING ARTIFACT DATABASE...", "success");

        const links = [
            {
                name: "Artifact 001 - The Hollow Signal",
                page: "artifact-001.html"
            },
            {
                name: "Artifact 002 - Blacksite Echo",
                page: "artifact-002.html"
            },
            {
                name: "Artifact 003 - The Janus File",
                page: "artifact-003.html"
            }
        ];

        links.forEach(link => {
            addLine(
                `<a class="database-link" href="${link.page}">
                    ${link.name}
                </a>`
            );
        });
    }

    // COMMAND HANDLER
    input.addEventListener("keydown", function(e){

        if(e.key === "Enter"){

            const command = input.value.trim();
            addLine(
                `<span style="color:#00ff88">${prefix.textContent}</span> ${command}`
            );

            const lower = command.toLowerCase();

            // BEFORE LOGIN
            if(!loggedIn){

                switch(lower){

                    case "help":
                        showHelp();
                        break;

                    case "login":

                        const enteredUser = prompt("ENTER USERNAME");
                        const enteredPass = prompt("ENTER PASSWORD");

                        // Simple ARG login system
                        if(
                            enteredUser === "darkstate" &&
                            enteredPass === "expedition"
                        ){
                            loggedIn = true;
                            username = enteredUser;

                            updateUI();

                            addLine("AUTHENTICATION SUCCESSFUL", "success");
                            addLine("ACCESS GRANTED", "success");

                        } else {
                            addLine("ACCESS DENIED", "error");
                        }

                        break;

                    default:
                        addLine("UNKNOWN COMMAND", "error");
                }

            }

            // AFTER LOGIN
            else {

                switch(lower){

                    case "help":
                        showHelp();
                        break;

                    case "logout":

                        loggedIn = false;
                        username = "Guest";

                        updateUI();

                        addLine("SESSION TERMINATED", "error");
                        break;

                    case "database":
                        showDatabase();
                        break;

                    default:
                        addLine("UNKNOWN COMMAND", "error");
                }
            }

            input.value = "";
        }

    });

    updateUI();
</script>

</body>
</html>
