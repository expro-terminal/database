<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Exclusion Zone Mapping</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    background:black;
    font-family:"Courier New", monospace;
    color:#00ff88;
}

/* TOP BAR */

.topbar{
    position:fixed;
    top:0;
    left:0;
    width:100%;

    padding:15px 20px;

    border-bottom:1px solid #00ff88;

    background:rgba(0,0,0,0.9);

    z-index:1000;
}

.topbar h1{
    font-size:22px;
}

.topbar p{
    font-size:13px;
    color:#7dffb2;
}

/* MAP */

.map-container{
    width:100vw;
    height:100vh;
    overflow:hidden;
    position:relative;
    cursor:grab;
}

.map-container:active{
    cursor:grabbing;
}

#map{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%, -50%) scale(1);
    transform-origin:center;
    user-select:none;
    -webkit-user-drag:none;
    width:1200px;
}

/* MARKERS */

.marker{
    position:absolute;
    width:10px;
    height:10px;
    border-radius:50%;
    cursor:pointer;
    z-index:10;
    transform:translate(-50%, -50%);
}

.marker.green{ background:#00ff88; }
.marker.red{ background:#ff3b3b; }
.marker.yellow{ background:#ffd000; }
.marker.black{ background:#111; border:1px solid #00ff88; }
.marker.brown{ background:#8b5a2b; }
.marker.white{ background:#ffffff; }

/* LABEL ABOVE DOT */

.label{
    position:absolute;
    bottom:14px;
    left:50%;
    transform:translateX(-50%);
    font-size:11px;
    white-space:nowrap;
    color:#00ff88;
}

/* POPUP */

.popup{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%, -50%);
    width:320px;

    background:black;
    border:1px solid #00ff88;

    padding:15px;

    display:none;
    z-index:2000;
}

.popup img{
    width:100%;
    margin-top:10px;
    border:1px solid #00ff88;
}

.popup a{
    color:#6ed6ff;
    display:block;
    margin-top:10px;
    text-decoration:none;
}

.popup a:hover{
    text-decoration:underline;
}

.close{
    position:absolute;
    top:5px;
    right:8px;
    cursor:pointer;
}

/* CONTROLS */

.controls{
    position:fixed;
    bottom:20px;
    right:20px;
    display:flex;
    flex-direction:column;
    gap:10px;
    z-index:1000;
}

.controls button{
    width:50px;
    height:50px;
    border:1px solid #00ff88;
    background:black;
    color:#00ff88;
    font-size:22px;
    cursor:pointer;
}

.controls button:hover{
    background:#00ff88;
    color:black;
}

/* BACK */

.back{
    position:fixed;
    top:20px;
    right:20px;
    border:1px solid #00ff88;
    padding:8px 12px;
    color:#00ff88;
    text-decoration:none;
    z-index:1000;
}

/* SCANLINES */

.scanlines{
    position:fixed;
    inset:0;
    pointer-events:none;
    background:
        repeating-linear-gradient(
            to bottom,
            rgba(255,255,255,0.03),
            rgba(255,255,255,0.03) 1px,
            transparent 1px,
            transparent 3px
        );
    z-index:3000;
}

</style>
</head>

<body>

<div class="scanlines"></div>

<a class="back" href="index.html">RETURN</a>

<div class="topbar">
    <h1>EXCLUSION ZONE MAPPING</h1>
    <p>Interactive anomaly grid interface</p>
</div>

<div class="map-container" id="mapContainer">
    <img id="map" src="https://operator.coolsquad.xyz/u/luBi56.png">
</div>

<div class="controls">
    <button id="zoomIn">+</button>
    <button id="zoomOut">-</button>
</div>

<!-- POPUP -->
<div class="popup" id="popup">
    <div class="close" onclick="closePopup()">X</div>
    <div id="popupContent"></div>
</div>

<script>

const map = document.getElementById("map");
const container = document.getElementById("mapContainer");
const popup = document.getElementById("popup");
const popupContent = document.getElementById("popupContent");

let scale = 1;
let posX = 0;
let posY = 0;

let dragging = false;
let startX, startY;

/* APPLY OFFSET FUNCTION (+40, +40) */
function applyOffset(x, y){
    return { x: x + 40, y: y + 40 };
}

/* MARKERS DATA */

const markers = [

    { x:496, y:1218, color:"green", title:"Placid Wakes FOB" },

    { x:594, y:1195, color:"red", title:"Red Box",
        img:"https://operator.coolsquad.xyz/u/RIghwK.png",
        link:"artifact-001.html"
    },

    { x:550, y:373, color:"red", title:"The Monolith",
        img:"https://operator.coolsquad.xyz/u/mH30lg.png",
        link:"artifact-003.html"
    },

    { x:690, y:710, color:"yellow", title:"The Church" },

    { x:750, y:541, color:"black", title:"Black Prism" },

    { x:856, y:573, color:"brown", title:"AP Roots" },
    { x:758, y:739, color:"brown", title:"AP Roots" },
    { x:279, y:627, color:"brown", title:"AP Roots" },
    { x:831, y:682, color:"brown", title:"AP Roots" },

    { x:739, y:686, color:"white", title:"Newtons Triangle" },
    { x:760, y:643, color:"white", title:"Newtons Triangle" },
    { x:812, y:680, color:"white", title:"Newtons Triangle" }

];

/* CREATE MARKERS */

markers.forEach(m => {

    const dot = document.createElement("div");
    dot.className = `marker ${m.color}`;

    const adjusted = applyOffset(m.x, m.y);

    dot.style.left = adjusted.x + "px";
    dot.style.top = adjusted.y + "px";

    dot.onclick = () => {

        let html = `<h3>${m.title}</h3>`;

        if(m.img){
            html += `<img src="${m.img}">`;
        }

        if(m.link){
            html += `<a href="${m.link}">Open Document</a>`;
        }

        popupContent.innerHTML = html;
        popup.style.display = "block";
    };

    container.appendChild(dot);
});

/* CLOSE POPUP */

function closePopup(){
    popup.style.display = "none";
}

/* ZOOM */

document.getElementById("zoomIn").onclick = () => {
    scale += 0.1;
    update();
};

document.getElementById("zoomOut").onclick = () => {
    scale = Math.max(0.2, scale - 0.1);
    update();
};

/* DRAG */

container.addEventListener("mousedown", e => {
    dragging = true;
    startX = e.clientX - posX;
    startY = e.clientY - posY;
});

window.addEventListener("mouseup", () => dragging = false);

window.addEventListener("mousemove", e => {
    if(!dragging) return;
    posX = e.clientX - startX;
    posY = e.clientY - startY;
    update();
});

/* SCROLL ZOOM */

window.addEventListener("wheel", e => {
    e.preventDefault();
    scale += (e.deltaY < 0 ? 0.1 : -0.1);
    scale = Math.max(0.2, scale);
    update();
},{ passive:false });

/* UPDATE MAP */

function update(){
    map.style.transform =
        `translate(calc(-50% + ${posX}px), calc(-50% + ${posY}px)) scale(${scale})`;

    document.querySelectorAll(".marker").forEach(m => {
        m.style.transform += "";
    });
}

update();

</script>

</body>
</html>
