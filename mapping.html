<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exclusion Zone Mapping</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Courier New", monospace;
}

body{
    overflow:hidden;
    background:black;
    color:#00ff88;
}

/* TOP BAR */

.topbar{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    padding:12px 20px;
    border-bottom:1px solid #00ff88;
    background:rgba(0,0,0,0.9);
    z-index:1000;
}

.topbar h1{
    font-size:20px;
}

/* MAP */

.map-container{
    width:100vw;
    height:100vh;
    overflow:hidden;
    position:relative;
    cursor:grab;
}

.map-container:active{
    cursor:grabbing;
}

#map{
    position:absolute;
    top:0;
    left:0;
    width:1200px;
    user-select:none;
    pointer-events:none;
}

/* MARKERS */

.marker{
    position:absolute;
    width:10px;
    height:10px;
    border-radius:50%;
    transform:translate(-50%, -50%);
    cursor:pointer;
    z-index:10;
}

.marker:hover .label{
    opacity:1;
}

.label{
    position:absolute;
    top:-18px;
    left:50%;
    transform:translateX(-50%);
    font-size:12px;
    white-space:nowrap;
    opacity:1;
    color:#00ff88;
}

/* COLORS */

.green{ background:#00ff88; }
.red{ background:#ff3b3b; }
.yellow{ background:#ffd000; }
.black{ background:#111; border:1px solid #00ff88; }
.brown{ background:#8b5a2b; }
.white{ background:#fff; }

/* POPUP */

.popup{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%, -50%);
    background:black;
    border:1px solid #00ff88;
    padding:20px;
    width:320px;
    display:none;
    z-index:2000;
}

.popup img{
    width:100%;
    margin-top:10px;
    border:1px solid #00ff88;
}

.popup a{
    display:block;
    margin-top:10px;
    color:#6ed6ff;
}

.close{
    position:absolute;
    top:5px;
    right:10px;
    cursor:pointer;
}

/* CONTROLS */

.controls{
    position:fixed;
    bottom:20px;
    right:20px;
    display:flex;
    flex-direction:column;
    gap:10px;
    z-index:1000;
}

.controls button{
    width:50px;
    height:50px;
    background:black;
    border:1px solid #00ff88;
    color:#00ff88;
    font-size:20px;
    cursor:pointer;
}

/* SCANLINES */

.scanlines{
    position:fixed;
    inset:0;
    pointer-events:none;
    background:repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,0.03),
        rgba(255,255,255,0.03) 1px,
        transparent 1px,
        transparent 3px
    );
}

</style>
</head>

<body>

<div class="scanlines"></div>

<div class="topbar">
    <h1>EXCLUSION ZONE MAPPING</h1>
</div>

<div class="map-container" id="mapContainer">

    <img src="https://operator.coolsquad.xyz/u/luBi56.png" id="map">

    <!-- MARKERS -->
    <div class="marker green" style="top:1218px; left:496px;"
        onclick="openPopup('Placid Wakes FOB')">
        <div class="label">Placid Wakes FOB</div>
    </div>

    <div class="marker red" style="top:1195px; left:594px;"
        onclick="openPopup('Red Box', 'https://operator.coolsquad.xyz/u/RIghwK.png', 'artifact-001.html')">
        <div class="label">Red Box</div>
    </div>

    <div class="marker red" style="top:373px; left:550px;"
        onclick="openPopup('The Monolith', 'https://operator.coolsquad.xyz/u/mH30lg.png', 'artifact-003.html')">
        <div class="label">The Monolith</div>
    </div>

    <div class="marker yellow" style="top:710px; left:690px;"
        onclick="openPopup('The Church')">
        <div class="label">The Church</div>
    </div>

    <div class="marker black" style="top:541px; left:750px;"
        onclick="openPopup('Black Prism')">
        <div class="label">Black Prism</div>
    </div>

    <div class="marker brown" style="top:573px; left:856px;"
        onclick="openPopup('AP Roots')">
        <div class="label">AP Roots</div>
    </div>

    <div class="marker brown" style="top:739px; left:758px;"
        onclick="openPopup('AP Roots')">
        <div class="label">AP Roots</div>
    </div>

    <div class="marker brown" style="top:627px; left:279px;"
        onclick="openPopup('AP Roots')">
        <div class="label">AP Roots</div>
    </div>

    <div class="marker brown" style="top:682px; left:831px;"
        onclick="openPopup('AP Roots')">
        <div class="label">AP Roots</div>
    </div>

    <div class="marker white" style="top:686px; left:739px;"
        onclick="openPopup('Newtons Triangle')">
        <div class="label">Newtons Triangle</div>
    </div>

    <div class="marker white" style="top:643px; left:760px;"
        onclick="openPopup('Newtons Triangle')">
        <div class="label">Newtons Triangle</div>
    </div>

    <div class="marker white" style="top:680px; left:812px;"
        onclick="openPopup('Newtons Triangle')">
        <div class="label">Newtons Triangle</div>
    </div>

</div>

<!-- POPUP -->
<div class="popup" id="popup">
    <div class="close" onclick="closePopup()">X</div>
    <h3 id="popupTitle"></h3>
    <img id="popupImg" style="display:none;">
    <a id="popupLink" target="_blank"></a>
</div>

<!-- CONTROLS -->
<div class="controls">
    <button onclick="zoomIn()">+</button>
    <button onclick="zoomOut()">−</button>
</div>

<script>

const map = document.getElementById("map");
const container = document.getElementById("mapContainer");

let scale = 1;
let x = 0;
let y = 0;

/* DRAG */

let dragging = false;
let startX, startY;

container.addEventListener("mousedown", e=>{
    dragging = true;
    startX = e.clientX - x;
    startY = e.clientY - y;
});

window.addEventListener("mouseup", ()=> dragging=false);

window.addEventListener("mousemove", e=>{
    if(!dragging) return;
    x = e.clientX - startX;
    y = e.clientY - startY;
    update();
});

/* ZOOM */

function zoomIn(){ scale += 0.1; update(); }
function zoomOut(){ scale = Math.max(0.2, scale-0.1); update(); }

function update(){
    map.style.transform =
        `translate(${x}px, ${y}px) scale(${scale})`;

    document.querySelectorAll(".marker").forEach(m=>{
        m.style.transform = `translate(${x}px, ${y}px) scale(${scale})`;
    });
}

/* POPUP */

function openPopup(title, img=null, link=null){

    document.getElementById("popup").style.display="block";
    document.getElementById("popupTitle").innerText = title;

    const image = document.getElementById("popupImg");
    const linkEl = document.getElementById("popupLink");

    if(img){
        image.src = img;
        image.style.display="block";
    } else {
        image.style.display="none";
    }

    if(link){
        linkEl.href = link;
        linkEl.innerText = "OPEN FILE";
        linkEl.style.display="block";
    } else {
        linkEl.style.display="none";
    }
}

function closePopup(){
    document.getElementById("popup").style.display="none";
}

/* WHEEL ZOOM */

window.addEventListener("wheel", e=>{
    e.preventDefault();
    if(e.deltaY<0) scale+=0.1;
    else scale=Math.max(0.2, scale-0.1);
    update();
},{passive:false});

update();

</script>

</body>
</html>
