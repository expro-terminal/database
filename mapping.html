<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exclusion Zone Mapping</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Courier New", monospace;
}

body{
    overflow:hidden;
    background:black;
}

/* TOP BAR */

.topbar{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    padding:15px 20px;
    border-bottom:1px solid #00ff88;
    background:rgba(0,0,0,0.9);
    z-index:1000;
    color:#00ff88;
}

.topbar h1{
    font-size:22px;
}

.topbar p{
    font-size:13px;
    color:#7dffb2;
}

/* MAP */

.map-container{
    width:100vw;
    height:100vh;
    overflow:hidden;
    position:relative;
    cursor:grab;
}

.map-container:active{
    cursor:grabbing;
}

#map{
    position:absolute;
    top:50%;
    left:50%;
    transform-origin:0 0;
    user-select:none;
    -webkit-user-drag:none;
    width:1200px;
}

/* MARKERS LAYER */

#markerLayer{
    position:absolute;
    top:0;
    left:0;
    width:1200px;
    height:auto;
    pointer-events:none;
    transform-origin:0 0;
}

/* MARKERS */

.marker{
    position:absolute;
    transform:translate(-50%, -50%);
    pointer-events:auto;
    cursor:pointer;
}

.dot{
    width:10px;
    height:10px;
    border-radius:50%;
    border:1px solid white;
    box-shadow:0 0 8px currentColor;
}

.label{
    position:absolute;
    transform:translate(-50%, -130%);
    white-space:nowrap;
    font-size:12px;
    color:#00ff88;
    text-shadow:0 0 5px black;
}

/* COLORS */

.green{ background:#00ff88; color:#00ff88; }
.red{ background:#ff3b3b; color:#ff3b3b; }
.yellow{ background:#ffd000; color:#ffd000; }
.black{ background:#222; color:#888; }
.brown{ background:#8b5a2b; color:#8b5a2b; }
.white{ background:#e6e6e6; color:#e6e6e6; }

/* POPUP */

.popup{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    background:black;
    border:1px solid #00ff88;
    padding:20px;
    width:320px;
    color:#00ff88;
    z-index:2000;
    display:none;
}

.popup img{
    width:100%;
    margin-top:10px;
    border:1px solid #00ff88;
}

.popup a{
    color:#6ed6ff;
    display:block;
    margin-top:10px;
}

.close{
    float:right;
    cursor:pointer;
    color:red;
}

/* CONTROLS */

.controls{
    position:fixed;
    bottom:20px;
    right:20px;
    z-index:1000;
}

.controls button{
    width:45px;
    height:45px;
    margin:5px;
    background:black;
    border:1px solid #00ff88;
    color:#00ff88;
    font-size:20px;
    cursor:pointer;
}

/* BACK */

.back{
    position:fixed;
    top:15px;
    right:15px;
    z-index:1000;
    border:1px solid #00ff88;
    padding:8px 12px;
    color:#00ff88;
    text-decoration:none;
}

</style>
</head>

<body>

<div class="topbar">
    <h1>EXCLUSION ZONE MAPPING</h1>
    <p>Interactive anomaly tracking grid</p>
</div>

<a class="back" href="index.html">RETURN</a>

<div class="map-container" id="container">

    <img src="https://operator.coolsquad.xyz/u/luBi56.png" id="map">

    <div id="markerLayer"></div>

</div>

<div class="controls">
    <button id="in">+</button>
    <button id="out">−</button>
</div>

<div class="popup" id="popup">
    <span class="close" onclick="closePopup()">X</span>
    <div id="popupContent"></div>
</div>

<script>

const map = document.getElementById("map");
const layer = document.getElementById("markerLayer");
const container = document.getElementById("container");

let scale = 1;
let x = 0;
let y = 0;

let dragging = false;
let startX, startY;

/* MAP SIZE (IMPORTANT FOR COORDINATES) */
const MAP_W = 1200;
const MAP_H = 1400;

/* MARKERS DATA */

const markers = [

{ x:496, y:1218, color:"green", title:"Placid Wakes FOB" },

{ x:594, y:1195, color:"red", title:"Red Box",
  img:"https://operator.coolsquad.xyz/u/RIghwK.png",
  link:"artifact-001.html"
},

{ x:550, y:373, color:"red", title:"The Monolith",
  img:"https://operator.coolsquad.xyz/u/mH30lg.png",
  link:"artifact-003.html"
},

{ x:690, y:710, color:"yellow", title:"The Church" },

{ x:750, y:541, color:"black", title:"Black Prism" },

{ x:856, y:573, color:"brown", title:"AP Roots" },
{ x:758, y:739, color:"brown", title:"AP Roots" },
{ x:279, y:627, color:"brown", title:"AP Roots" },
{ x:831, y:682, color:"brown", title:"AP Roots" },

{ x:739, y:686, color:"white", title:"Newtons Triangle" },
{ x:760, y:643, color:"white", title:"Newtons Triangle" },
{ x:812, y:680, color:"white", title:"Newtons Triangle" }

];

/* RENDER MARKERS */

function renderMarkers(){

    layer.innerHTML = "";

    markers.forEach(m => {

        const el = document.createElement("div");
        el.className = "marker";

        el.style.left = m.x + "px";
        el.style.top = m.y + "px";

        const dot = document.createElement("div");
        dot.className = "dot " + m.color;

        const label = document.createElement("div");
        label.className = "label";
        label.textContent = m.title;

        el.appendChild(dot);
        el.appendChild(label);

        el.onclick = () => {

            let html = `<h3>${m.title}</h3>`;

            if(m.img){
                html += `<img src="${m.img}">`;
            }

            if(m.link){
                html += `<a href="${m.link}">Open File</a>`;
            }

            openPopup(html);
        };

        layer.appendChild(el);
    });
}

/* POPUP */

function openPopup(html){
    document.getElementById("popupContent").innerHTML = html;
    document.getElementById("popup").style.display = "block";
}

function closePopup(){
    document.getElementById("popup").style.display = "none";
}

/* TRANSFORM */

function update(){

    const transform =
        `translate(${x}px, ${y}px) scale(${scale})`;

    map.style.transform = transform;
    layer.style.transform = transform;
}

/* DRAG */

container.addEventListener("mousedown", e => {
    dragging = true;
    startX = e.clientX - x;
    startY = e.clientY - y;
});

window.addEventListener("mouseup", () => dragging = false);

window.addEventListener("mousemove", e => {
    if(!dragging) return;

    x = e.clientX - startX;
    y = e.clientY - startY;

    update();
});

/* ZOOM */

document.getElementById("in").onclick = () => {
    scale += 0.1;
    update();
};

document.getElementById("out").onclick = () => {
    scale = Math.max(0.2, scale - 0.1);
    update();
};

renderMarkers();
update();

</script>

<div class="popup" id="popup">
    <div id="popupContent"></div>
</div>

</body>
</html>
