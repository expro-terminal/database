<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Exclusion Zone Mapping</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    background:black;
    font-family:"Courier New", monospace;
    color:#00ff88;
}

/* TOP BAR */

.topbar{
    position:fixed;
    top:0;
    left:0;
    width:100%;

    padding:15px 20px;

    border-bottom:1px solid #00ff88;

    background:rgba(0,0,0,0.9);

    z-index:5000;
}

.topbar h1{
    font-size:24px;
    margin-bottom:5px;
}

.topbar p{
    color:#7dffb2;
    font-size:14px;
}

/* RETURN BUTTON */

.back{
    position:fixed;

    top:20px;
    right:20px;

    color:#00ff88;

    text-decoration:none;

    border:1px solid #00ff88;

    padding:10px 15px;

    z-index:6000;

    transition:0.2s;
}

.back:hover{
    background:#00ff88;
    color:black;
}

/* MAP AREA */

.map-container{
    width:100vw;
    height:100vh;

    overflow:hidden;

    position:relative;

    cursor:grab;
}

.map-container:active{
    cursor:grabbing;
}

/* MAP WRAPPER */

#mapWrapper{
    position:absolute;

    top:50%;
    left:50%;

    transform:translate(-50%, -50%) scale(1);

    transform-origin:center center;
}

/* MAP */

#map{
    width:1200px;
    display:block;

    user-select:none;
    -webkit-user-drag:none;
}

/* MARKERS */

.marker{
    position:absolute;

    width:14px;
    height:14px;

    border-radius:50%;

    transform:translate(-50%, -50%);

    cursor:pointer;

    border:1px solid rgba(255,255,255,0.3);
}

/* LABELS */

.label{
    position:absolute;

    transform:translate(-50%, -100%);

    margin-top:-10px;

    font-size:12px;

    white-space:nowrap;

    text-shadow:0 0 5px black;

    pointer-events:none;
}

/* COLORS */

.green{ background:#00ff88; }
.red{ background:#ff3333; }
.yellow{ background:#ffee00; }
.black{ background:#111; }
.brown{ background:#8b5a2b; }

/* POPUP */

.popup{
    position:fixed;

    top:50%;
    left:50%;

    transform:translate(-50%, -50%);

    width:420px;

    max-width:90vw;

    background:black;

    border:1px solid #00ff88;

    padding:20px;

    z-index:9999;

    display:none;
}

.popup h2{
    margin-bottom:15px;
}

.popup img{
    width:100%;
    border:1px solid #00ff88;
    margin-top:10px;
}

.popup a{
    color:#6ed6ff;
}

.close-btn{
    margin-top:20px;

    padding:10px 15px;

    border:1px solid #00ff88;

    background:black;

    color:#00ff88;

    cursor:pointer;
}

/* TRIANGLE */

#triangle{
    position:absolute;

    pointer-events:auto;

    cursor:pointer;
}

/* CONTROLS */

.controls{
    position:fixed;

    bottom:20px;
    right:20px;

    display:flex;
    flex-direction:column;

    gap:10px;

    z-index:5000;
}

.controls button{
    width:50px;
    height:50px;

    background:black;

    color:#00ff88;

    border:1px solid #00ff88;

    font-size:24px;

    cursor:pointer;
}

/* SCANLINES */

.scanlines{
    position:fixed;
    inset:0;

    pointer-events:none;

    background:
    repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,0.03),
        rgba(255,255,255,0.03) 1px,
        transparent 1px,
        transparent 3px
    );

    z-index:10000;
}

</style>
</head>

<body>

<div class="scanlines"></div>

<a href="index.html" class="back">
RETURN
</a>

<div class="topbar">

    <h1>EXCLUSION ZONE MAPPING</h1>

    <p>
        Interactive terrain and anomaly mapping interface.
    </p>

</div>

<div class="map-container" id="mapContainer">

    <div id="mapWrapper">

        <img
            src="https://operator.coolsquad.xyz/u/luBi56.png"
            id="map"
            draggable="false"
        >

        <!-- SVG TRIANGLE -->

        <svg
            id="triangle"
            width="1200"
            height="1200"
        >

            <polygon
                points="739,686 760,643 812,680"
                fill="rgba(255,255,255,0.08)"
                stroke="rgba(255,255,255,0.2)"
                stroke-width="2"
                onclick="showPopup('Newtons Triangle')"
            />

        </svg>

    </div>

</div>

<div class="controls">

    <button id="zoomIn">+</button>
    <button id="zoomOut">−</button>

</div>

<!-- POPUP -->

<div class="popup" id="popup">

    <div id="popupContent"></div>

    <button class="close-btn" onclick="closePopup()">
        CLOSE
    </button>

</div>

<script>

/* MAP CONTROL */

const mapWrapper = document.getElementById("mapWrapper");
const container = document.getElementById("mapContainer");

let scale = 1;
let posX = 0;
let posY = 0;

let isDragging = false;

let startX;
let startY;

function updateMap(){

    mapWrapper.style.transform =
        `translate(calc(-50% + ${posX}px), calc(-50% + ${posY}px)) scale(${scale})`;
}

/* ZOOM */

document.getElementById("zoomIn").onclick = () => {

    scale += 0.1;
    updateMap();
};

document.getElementById("zoomOut").onclick = () => {

    scale -= 0.1;

    if(scale < 0.2){
        scale = 0.2;
    }

    updateMap();
};

/* DRAG */

container.addEventListener("mousedown", (e) => {

    isDragging = true;

    startX = e.clientX - posX;
    startY = e.clientY - posY;
});

window.addEventListener("mouseup", () => {

    isDragging = false;
});

window.addEventListener("mousemove", (e) => {

    if(!isDragging) return;

    posX = e.clientX - startX;
    posY = e.clientY - startY;

    updateMap();
});

/* SCROLL ZOOM */

window.addEventListener("wheel", (e) => {

    e.preventDefault();

    if(e.deltaY < 0){

        scale += 0.1;

    } else {

        scale -= 0.1;

        if(scale < 0.2){
            scale = 0.2;
        }
    }

    updateMap();

}, { passive:false });

/* POPUPS */

function showPopup(title, image=null, link=null){

    let html = `<h2>${title}</h2>`;

    if(image){

        html += `
        <img src="${image}">
        `;
    }

    if(link){

        html += `
        <br><br>
        <a href="${link}">
            Open Artifact File
        </a>
        `;
    }

    document.getElementById("popupContent").innerHTML = html;

    document.getElementById("popup").style.display = "block";
}

function closePopup(){

    document.getElementById("popup").style.display = "none";
}

/* MARKERS */

const markers = [

{
    x:496,
    y:1218,
    color:"green",
    title:"Placid Wakes FOB"
},

{
    x:594,
    y:1195,
    color:"red",
    title:"Red Box",
    image:"https://operator.coolsquad.xyz/u/RIghwK.png",
    link:"artifact-001.html"
},

{
    x:550,
    y:373,
    color:"red",
    title:"The Monolith",
    image:"https://operator.coolsquad.xyz/u/mH30lg.png",
    link:"artifact-003.html"
},

{
    x:690,
    y:710,
    color:"yellow",
    title:"The Church"
},

{
    x:750,
    y:541,
    color:"black",
    title:"Black Prism"
},

{
    x:856,
    y:573,
    color:"brown",
    title:"AP Roots"
},

{
    x:758,
    y:739,
    color:"brown",
    title:"AP Roots"
},

{
    x:279,
    y:627,
    color:"brown",
    title:"AP Roots"
},

{
    x:831,
    y:682,
    color:"brown",
    title:"AP Roots"
}

];

markers.forEach(marker => {

    const dot = document.createElement("div");

    dot.className = `marker ${marker.color}`;

    dot.style.left = marker.x + "px";
    dot.style.top = marker.y + "px";

    dot.onclick = () => {

        showPopup(
            marker.title,
            marker.image,
            marker.link
        );
    };

    const label = document.createElement("div");

    label.className = "label";

    label.style.left = marker.x + "px";
    label.style.top = (marker.y - 10) + "px";

    label.innerText = marker.title;

    mapWrapper.appendChild(dot);
    mapWrapper.appendChild(label);

});

updateMap();

</script>

</body>
</html>
