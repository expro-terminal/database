<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exclusion Zone Mapping</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Courier New",monospace;}
body{overflow:hidden;background:black;color:#00ff88;}

.topbar{
    position:fixed;top:0;left:0;width:100%;
    padding:12px 20px;border-bottom:1px solid #00ff88;
    background:rgba(0,0,0,0.9);z-index:1000;
}
.topbar h1{font-size:20px;}

.map-container{
    width:100vw;height:100vh;overflow:hidden;
    position:relative;cursor:crosshair;
}
.map-container:active{cursor:grabbing;}

#mapWorld{
    position:absolute;top:0;left:0;
    width:1158px;transform-origin:0 0;
}

#map{display:block;width:1158px;height:1320px;user-select:none;pointer-events:none;}

#gridCanvas{
    position:absolute;top:0;left:0;
    pointer-events:none;z-index:5;
}

.marker{
    position:absolute;width:10px;height:10px;
    border-radius:50%;margin-left:-5px;margin-top:-5px;
    cursor:pointer;z-index:10;
}
.label{
    position:absolute;top:-18px;left:50%;
    transform:translateX(-50%);
    font-size:12px;white-space:nowrap;
    color:#00ff88;
}

.green{background:#00ff88;}
.red{background:#ff3b3b;}
.yellow{background:#ffd000;}
.black{background:#111;border:1px solid #00ff88;}
.brown{background:#8b5a2b;}
.white{background:#fff;}

.popup{
    position:fixed;top:50%;left:50%;
    transform:translate(-50%,-50%);
    background:black;border:1px solid #00ff88;
    padding:20px;width:320px;display:none;z-index:2000;
}
.popup img{width:100%;margin-top:10px;border:1px solid #00ff88;}
.popup a{display:block;margin-top:10px;color:#6ed6ff;}
.close{position:absolute;top:5px;right:10px;cursor:pointer;}

.controls{
    position:fixed;bottom:20px;right:20px;
    display:flex;flex-direction:column;gap:10px;z-index:1000;
}
.controls button{
    width:50px;height:50px;background:black;
    border:1px solid #00ff88;color:#00ff88;
    font-size:20px;cursor:pointer;
}

.scanlines{
    position:fixed;inset:0;pointer-events:none;
    background:repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,0.03),
        rgba(255,255,255,0.03) 1px,
        transparent 1px,
        transparent 3px
    );
}

#cursorTip{
    display:none;
    position:fixed;
    pointer-events:none;
    background:rgba(0,0,0,0.92);
    border:1px solid #00ff88;
    padding:5px 10px;
    font-size:12px;
    font-family:"Courier New",monospace;
    color:#00ff88;
    z-index:5000;
    white-space:nowrap;
    line-height:1.8;
}
#tipGrid{color:#ffd000;}
</style>
</head>
<body>

<div class="scanlines"></div>

<div class="topbar">
    <h1>EXCLUSION ZONE MAPPING</h1>
</div>

<div class="map-container" id="mapContainer">
    <div id="mapWorld">
        <img src="https://operator.coolsquad.xyz/u/luBi56.png" id="map">
        <canvas id="gridCanvas"></canvas>

        <div class="marker green" style="top:1218px;left:496px;" onclick="openPopup('Placid Wakes FOB')">
            <div class="label">Placid Wakes FOB</div>
        </div>
        <div class="marker red" style="top:1195px;left:594px;" onclick="openPopup('Red Box','https://operator.coolsquad.xyz/u/RIghwK.png','artifact-001.html')">
            <div class="label">Red Box</div>
        </div>
        <div class="marker red" style="top:373px;left:550px;" onclick="openPopup('The Monolith','https://operator.coolsquad.xyz/u/mH30lg.png','artifact-003.html')">
            <div class="label">The Monolith</div>
        </div>
        <div class="marker yellow" style="top:710px;left:690px;" onclick="openPopup('The Church')">
            <div class="label">The Church</div>
        </div>
        <div class="marker black" style="top:541px;left:750px;" onclick="openPopup('Black Prism')">
            <div class="label">Black Prism</div>
        </div>
        <div class="marker brown" style="top:573px;left:856px;" onclick="openPopup('AP Roots')">
            <div class="label">AP Roots</div>
        </div>
        <div class="marker brown" style="top:739px;left:758px;" onclick="openPopup('AP Roots')">
            <div class="label">AP Roots</div>
        </div>
        <div class="marker brown" style="top:627px;left:279px;" onclick="openPopup('AP Roots')">
            <div class="label">AP Roots</div>
        </div>
        <div class="marker brown" style="top:682px;left:831px;" onclick="openPopup('AP Roots')">
            <div class="label">AP Roots</div>
        </div>
        <div class="marker white" style="top:686px;left:739px;" onclick="openPopup('Newtons Triangle')">
            <div class="label">Newtons Triangle</div>
        </div>
        <div class="marker white" style="top:643px;left:760px;" onclick="openPopup('Newtons Triangle')">
            <div class="label">Newtons Triangle</div>
        </div>
        <div class="marker white" style="top:680px;left:812px;" onclick="openPopup('Newtons Triangle')">
            <div class="label">Newtons Triangle</div>
        </div>
    </div>
</div>

<div id="cursorTip">
    <div id="tipPx"></div>
    <div id="tipGrid"></div>
</div>

<div class="popup" id="popup">
    <div class="close" onclick="closePopup()">X</div>
    <h3 id="popupTitle"></h3>
    <img id="popupImg" style="display:none;">
    <a id="popupLink" target="_blank"></a>
</div>

<div class="controls">
    <button onclick="zoomIn()">+</button>
    <button onclick="zoomOut()">-</button>
</div>

<script>
const world     = document.getElementById("mapWorld");
const container = document.getElementById("mapContainer");
const mapImg    = document.getElementById("map");
const canvas    = document.getElementById("gridCanvas");
const ctx       = canvas.getContext("2d");
const tip       = document.getElementById("cursorTip");
const tipPx     = document.getElementById("tipPx");
const tipGrid   = document.getElementById("tipGrid");

const COLS = 21;
const ROWS = 24;
const LETTERS = "ABCDEFGHIJKLMNOPQRSTU";

let scale = 1, x = 0, y = 0;
let mapW = 1158, mapH = 1320;

function drawGrid(){
    if(!mapH) return;
    const cW = mapW / COLS;
    const cH = mapH / ROWS;
    canvas.width  = mapW;
    canvas.height = mapH;
    ctx.clearRect(0, 0, mapW, mapH);

    // grid lines
    ctx.strokeStyle = "rgba(0,255,136,0.15)";
    ctx.lineWidth = 1;
    for(let c = 0; c <= COLS; c++){
        ctx.beginPath(); ctx.moveTo(c*cW, 0); ctx.lineTo(c*cW, mapH); ctx.stroke();
    }
    for(let r = 0; r <= ROWS; r++){
        ctx.beginPath(); ctx.moveTo(0, r*cH); ctx.lineTo(mapW, r*cH); ctx.stroke();
    }

    // labels
    ctx.fillStyle = "rgba(0,255,136,0.5)";
    ctx.font = "bold 11px 'Courier New',monospace";

    // column letters (top of each cell)
    ctx.textAlign = "center";
    ctx.textBaseline = "top";
    for(let c = 0; c < COLS; c++){
        ctx.fillText(LETTERS[c], c*cW + cW/2, 3);
    }

    // row numbers (left of each cell)
    ctx.textAlign = "left";
    ctx.textBaseline = "middle";
    for(let r = 0; r < ROWS; r++){
        ctx.fillText(String(r+1), 3, r*cH + cH/2);
    }
}

function initGrid(){
    mapW = 1158;
    mapH = 1320;
    drawGrid();
}

mapImg.addEventListener("load", initGrid);
initGrid();

/* DRAG */
let dragging = false, sx, sy;
container.addEventListener("mousedown", e=>{ dragging=true; sx=e.clientX-x; sy=e.clientY-y; });
window.addEventListener("mouseup", ()=> dragging=false);
window.addEventListener("mousemove", e=>{
    if(dragging){ x=e.clientX-sx; y=e.clientY-sy; update(); }
    moveTip(e);
});

/* ZOOM */
function zoomIn(){ scale=Math.min(4,+(scale+0.1).toFixed(2)); update(); }
function zoomOut(){ scale=Math.max(0.2,+(scale-0.1).toFixed(2)); update(); }
function update(){ world.style.transform=`translate(${x}px,${y}px) scale(${scale})`; }
window.addEventListener("wheel", e=>{
    e.preventDefault();
    scale = e.deltaY<0 ? Math.min(4,+(scale+0.1).toFixed(2)) : Math.max(0.2,+(scale-0.1).toFixed(2));
    update();
},{passive:false});

/* CURSOR TOOLTIP */
container.addEventListener("mouseenter", ()=> tip.style.display="block");
container.addEventListener("mouseleave", ()=> tip.style.display="none");

function moveTip(e){
    const mx = Math.round((e.clientX - x) / scale);
    const my = Math.round((e.clientY - y) / scale);

    const cW = mapW / COLS;
    const cH = (mapH||1) / ROWS;
    const col = Math.floor(mx / cW);
    const row = Math.floor(my / cH);
    const letter = (col>=0 && col<COLS) ? LETTERS[col] : "-";
    const num    = (row>=0 && row<ROWS) ? (row+1) : "-";

    tipPx.textContent   = "X:" + mx + "  Y:" + my;
    tipGrid.textContent = "GRID: " + letter + num;

    let tx = e.clientX + 18;
    let ty = e.clientY + 18;
    if(tx + tip.offsetWidth  > window.innerWidth)  tx = e.clientX - tip.offsetWidth  - 8;
    if(ty + tip.offsetHeight > window.innerHeight) ty = e.clientY - tip.offsetHeight - 8;
    tip.style.left = tx+"px";
    tip.style.top  = ty+"px";
}

/* POPUP */
function openPopup(title,img,link){
    document.getElementById("popup").style.display="block";
    document.getElementById("popupTitle").innerText=title;
    const image=document.getElementById("popupImg");
    const linkEl=document.getElementById("popupLink");
    if(img){image.src=img;image.style.display="block";}else{image.style.display="none";}
    if(link){linkEl.href=link;linkEl.innerText="OPEN FILE";linkEl.style.display="block";}else{linkEl.style.display="none";}
}
function closePopup(){ document.getElementById("popup").style.display="none"; }

update();
</script>
</body>
</html>
