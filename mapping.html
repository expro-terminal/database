<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exclusion Zone Mapping</title>

<style>

*{ margin:0; padding:0; box-sizing:border-box; font-family:"Courier New",monospace; }
body{ overflow:hidden; background:black; color:#00ff88; }

.topbar{
    position:fixed; top:0; left:0; width:100%;
    padding:12px 20px; border-bottom:1px solid #00ff88;
    background:rgba(0,0,0,0.9); z-index:1000;
}
.topbar h1{ font-size:20px; }

.map-container{
    width:100vw; height:100vh; overflow:hidden;
    position:relative; cursor:crosshair;
}
.map-container:active{ cursor:grabbing; }

#mapWorld{
    position:absolute; top:0; left:0;
    width:1158px;
    transform-origin:0 0;
}

#map{
    display:block; width:1158px; height:1320px;
    user-select:none; pointer-events:none;
}

/* MARKERS */

.marker{
    position:absolute;
    width:10px;
    height:10px;
    border-radius:50%;
    margin-left:-5px;
    margin-top:-5px;
    cursor:pointer;
    z-index:10;
}

.label{
    position:absolute;
    top:-18px;
    left:50%;
    transform:translateX(-50%);
    font-size:12px;
    white-space:nowrap;
    color:#00ff88;
    pointer-events:none;
}

.green  { background:#00ff88; }
.red    { background:#ff3b3b; }
.yellow { background:#ffd000; }
.black  { background:#111; border:1px solid #00ff88; }
.brown  { background:#8b5a2b; }
.white  { background:#fff; }

#cursorTip{
    position:fixed;
    pointer-events:none;
    background:black;
    border:1px solid #00ff88;
    padding:5px 10px;
    font-size:12px;
    color:#00ff88;
    z-index:5000;
    white-space:nowrap;
    display:none;
}

.popup{
    position:fixed;
    background:black;
    border:1px solid #00ff88;
    padding:12px;
    width:260px;
    display:none;
    z-index:5000;
}

.popup img{
    width:100%;
    margin-top:10px;
    border:1px solid #00ff88;
}

.popup a{
    display:block;
    margin-top:10px;
    color:#6ed6ff;
}

.close{
    position:absolute;
    top:4px;
    right:8px;
    cursor:pointer;
}

/* CONTROLS */

.controls{
    position:fixed; bottom:20px; right:20px;
    display:flex; flex-direction:column; gap:10px;
    z-index:1000;
}
.controls button{
    width:50px; height:50px;
    background:black;
    border:1px solid #00ff88;
    color:#00ff88;
    font-size:20px;
    cursor:pointer;
}

.scanlines{
    position:fixed; inset:0; pointer-events:none;
    background:repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,0.03),
        rgba(255,255,255,0.03) 1px,
        transparent 1px,
        transparent 3px
    );
}

</style>
</head>

<body>

<div class="scanlines"></div>

<div class="topbar">
    <h1>EXCLUSION ZONE MAPPING</h1>
</div>

<div class="map-container" id="mapContainer">
    <div id="mapWorld">

        <img src="https://operator.coolsquad.xyz/u/luBi56.png" id="map">

        <!-- MARKERS (UNCHANGED) -->
        <div class="marker green" style="top:1218px;left:496px;" onclick="openPopup(event,'Placid Wakes FOB')"><div class="label">Placid Wakes FOB</div></div>
        <div class="marker red" style="top:1195px;left:594px;" onclick="openPopup(event,'Failed Containment #1','https://operator.coolsquad.xyz/u/RIghwK.png','artifact-001noaccess.html')"><div class="label">Red Box</div></div>
        <div class="marker red" style="top:373px;left:550px;" onclick="openPopup(event,'The Monolith','https://operator.coolsquad.xyz/u/mH30lg.png','artifact-003noaccess.html')"><div class="label">The Monolith</div></div>
        <div class="marker yellow" style="top:710px;left:690px;" onclick="openPopup(event,'The Church')"><div class="label">The Church</div></div>
        <div class="marker black" style="top:541px;left:750px;" onclick="openPopup(event,'Black Prism')"><div class="label">Black Prism</div></div>
        <div class="marker brown" style="top:573px;left:856px;" onclick="openPopup(event,'AP Roots')"><div class="label">AP Roots</div></div>
        <div class="marker brown" style="top:739px;left:758px;" onclick="openPopup(event,'AP Roots')"><div class="label">AP Roots</div></div>
        <div class="marker brown" style="top:627px;left:279px;" onclick="openPopup(event,'AP Roots')"><div class="label">AP Roots</div></div>
        <div class="marker brown" style="top:682px;left:831px;" onclick="openPopup(event,'AP Roots')"><div class="label">AP Roots</div></div>
        <div class="marker white" style="top:686px;left:739px;" onclick="openPopup(event,'Newtons Triangle')"><div class="label">Newtons Triangle</div></div>
        <div class="marker white" style="top:643px;left:760px;" onclick="openPopup(event,'Newtons Triangle')"><div class="label">Newtons Triangle</div></div>
        <div class="marker white" style="top:680px;left:812px;" onclick="openPopup(event,'Newtons Triangle')"><div class="label">Newtons Triangle</div></div>

    </div>
</div>

<div id="cursorTip"></div>

<div class="popup" id="popup">
    <div class="close" onclick="closePopup()">X</div>
    <h3 id="popupTitle"></h3>
    <img id="popupImg" style="display:none;">
    <a id="popupLink" target="_blank"></a>
</div>

<div class="controls">
    <button onclick="zoomIn()">+</button>
    <button onclick="zoomOut()">−</button>
</div>

<script>

const world     = document.getElementById("mapWorld");
const container = document.getElementById("mapContainer");
const tip       = document.getElementById("cursorTip");

let scale = 1, x = 0, y = 0;
let dragging = false, sx, sy;

/* =========================
   DRAG SYSTEM
========================= */

container.addEventListener("mousedown", e=>{
    dragging = true;
    sx = e.clientX - x;
    sy = e.clientY - y;
});

window.addEventListener("mouseup", ()=> dragging = false);

window.addEventListener("mousemove", e=>{
    if(dragging){
        x = e.clientX - sx;
        y = e.clientY - sy;
        update();
    }

    const mx = Math.round((e.clientX - x) / scale);
    const my = Math.round((e.clientY - y) / scale);

    tip.textContent = `X:${mx}  Y:${my}`;

    const pad = 14;
    let tx = e.clientX + pad;
    let ty = e.clientY + pad;

    if(tx + tip.offsetWidth > window.innerWidth)
        tx = e.clientX - tip.offsetWidth - pad;

    if(ty + tip.offsetHeight > window.innerHeight)
        ty = e.clientY - tip.offsetHeight - pad;

    tip.style.left = tx + "px";
    tip.style.top  = ty + "px";
});

container.addEventListener("mouseenter", ()=> tip.style.display="block");
container.addEventListener("mouseleave", ()=> tip.style.display="none");

/* =========================
   CORE TRANSFORM
========================= */

function update(){
    world.style.transform = `translate(${x}px,${y}px) scale(${scale})`;
}

/* =========================
   CURSOR-CENTERED ZOOM (NEW)
========================= */

function zoomAtPoint(newScale, mouseX, mouseY){

    const worldX = (mouseX - x) / scale;
    const worldY = (mouseY - y) / scale;

    scale = newScale;

    x = mouseX - worldX * scale;
    y = mouseY - worldY * scale;

    update();
}

/* BUTTON ZOOM */

function zoomIn(){
    const rect = container.getBoundingClientRect();
    zoomAtPoint(Math.min(5, scale + 0.1), rect.width/2, rect.height/2);
}

function zoomOut(){
    const rect = container.getBoundingClientRect();
    zoomAtPoint(Math.max(0.2, scale - 0.1), rect.width/2, rect.height/2);
}

/* WHEEL ZOOM (CURSOR BASED) */

window.addEventListener("wheel", e=>{
    e.preventDefault();

    const rect = container.getBoundingClientRect();

    const mouseX = e.clientX - rect.left;
    const mouseY = e.clientY - rect.top;

    const newScale = e.deltaY < 0
        ? Math.min(5, scale + 0.1)
        : Math.max(0.2, scale - 0.1);

    zoomAtPoint(newScale, mouseX, mouseY);

},{passive:false});

/* =========================
   POPUP
========================= */

function openPopup(event, title, img=null, link=null){

    const p = document.getElementById("popup");

    document.getElementById("popupTitle").innerText = title;

    const image = document.getElementById("popupImg");
    const linkEl = document.getElementById("popupLink");

    if(img){
        image.src = img;
        image.style.display = "block";
    } else image.style.display = "none";

    if(link){
        linkEl.href = link;
        linkEl.innerText = "OPEN FILE";
        linkEl.style.display = "block";
    } else linkEl.style.display = "none";

    const rect = event.target.getBoundingClientRect();

    let left = rect.right + 10;
    let top  = rect.top;

    if(left + 260 > window.innerWidth)
        left = rect.left - 270;

    if(top + 200 > window.innerHeight)
        top = window.innerHeight - 220;

    p.style.left = left + "px";
    p.style.top = top + "px";

    p.style.display = "block";

    event.stopPropagation();
}

function closePopup(){
    document.getElementById("popup").style.display = "none";
}

/* click outside closes popup */

window.addEventListener("click", e=>{
    const p = document.getElementById("popup");
    if(!p.contains(e.target)){
        p.style.display = "none";
    }
});

update();

</script>

</body>
</html>
