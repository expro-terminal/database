<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exclusion Zone Mapping</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Courier New", monospace;
}

body{
    overflow:hidden;
    background:black;
}

/* TOP BAR */

.topbar{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    padding:15px;
    border-bottom:1px solid #00ff88;
    background:rgba(0,0,0,0.9);
    z-index:1000;
    color:#00ff88;
}

/* VIEWPORT */

#viewport{
    width:100vw;
    height:100vh;
    overflow:hidden;
    position:relative;
    cursor:grab;
}

#viewport:active{
    cursor:grabbing;
}

/* WORLD (THIS IS THE IMPORTANT FIX) */

#world{
    position:absolute;
    top:0;
    left:0;
    transform-origin:0 0;
}

/* MAP */

#map{
    width:1200px;
    display:block;
}

/* MARKERS */

.marker{
    position:absolute;
    transform:translate(-50%, -50%);
    cursor:pointer;
}

.dot{
    width:10px;
    height:10px;
    border-radius:50%;
}

.label{
    position:absolute;
    transform:translate(-50%, -140%);
    font-size:12px;
    white-space:nowrap;
    color:#00ff88;
    text-shadow:0 0 5px black;
}

/* COLORS */

.green{ background:#00ff88; }
.red{ background:#ff3b3b; }
.yellow{ background:#ffd000; }
.black{ background:#222; }
.brown{ background:#8b5a2b; }
.white{ background:#e6e6e6; }

/* POPUP */

.popup{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    background:black;
    border:1px solid #00ff88;
    padding:20px;
    width:320px;
    display:none;
    z-index:2000;
    color:#00ff88;
}

.popup img{
    width:100%;
    margin-top:10px;
    border:1px solid #00ff88;
}

.popup a{
    color:#6ed6ff;
    display:block;
    margin-top:10px;
}

/* CONTROLS */

.controls{
    position:fixed;
    bottom:20px;
    right:20px;
    z-index:1000;
}

.controls button{
    width:45px;
    height:45px;
    margin:5px;
    border:1px solid #00ff88;
    background:black;
    color:#00ff88;
    cursor:pointer;
}

</style>
</head>

<body>

<div class="topbar">
    EXCLUSION ZONE MAPPING
</div>

<div id="viewport">

    <div id="world">

        <img id="map" src="https://operator.coolsquad.xyz/u/luBi56.png">

        <div id="markers"></div>

    </div>

</div>

<div class="controls">
    <button onclick="zoomIn()">+</button>
    <button onclick="zoomOut()">−</button>
</div>

<div class="popup" id="popup"></div>

<script>

const world = document.getElementById("world");
const viewport = document.getElementById("viewport");
const markerLayer = document.getElementById("markers");

let scale = 1;
let x = 0;
let y = 0;

let dragging = false;
let startX, startY;

/* MARKERS */

const markers = [

{ x:496, y:1218, color:"green", title:"Placid Wakes FOB" },

{ x:594, y:1195, color:"red", title:"Red Box",
  img:"https://operator.coolsquad.xyz/u/RIghwK.png",
  link:"artifact-001.html"
},

{ x:550, y:373, color:"red", title:"The Monolith",
  img:"https://operator.coolsquad.xyz/u/mH30lg.png",
  link:"artifact-003.html"
},

{ x:690, y:710, color:"yellow", title:"The Church" },

{ x:750, y:541, color:"black", title:"Black Prism" },

{ x:856, y:573, color:"brown", title:"AP Roots" },
{ x:758, y:739, color:"brown", title:"AP Roots" },
{ x:279, y:627, color:"brown", title:"AP Roots" },
{ x:831, y:682, color:"brown", title:"AP Roots" },

{ x:739, y:686, color:"white", title:"Newtons Triangle" },
{ x:760, y:643, color:"white", title:"Newtons Triangle" },
{ x:812, y:680, color:"white", title:"Newtons Triangle" }

];

/* BUILD MARKERS */

function buildMarkers(){

    markerLayer.innerHTML = "";

    markers.forEach(m => {

        const el = document.createElement("div");
        el.className = "marker";

        el.style.left = m.x + "px";
        el.style.top = m.y + "px";

        const dot = document.createElement("div");
        dot.className = "dot " + m.color;

        const label = document.createElement("div");
        label.className = "label";
        label.textContent = m.title;

        el.appendChild(dot);
        el.appendChild(label);

        el.onclick = () => {

            let html = `<h3>${m.title}</h3>`;

            if(m.img){
                html += `<img src="${m.img}">`;
            }

            if(m.link){
                html += `<a href="${m.link}">Open File</a>`;
            }

            document.getElementById("popup").innerHTML = html;
            document.getElementById("popup").style.display = "block";
        };

        markerLayer.appendChild(el);
    });
}

/* TRANSFORM */

function update(){

    world.style.transform =
        `translate(${x}px, ${y}px) scale(${scale})`;
}

/* ZOOM */

function zoomIn(){
    scale += 0.1;
    update();
}

function zoomOut(){
    scale = Math.max(0.2, scale - 0.1);
    update();
}

/* DRAG */

viewport.addEventListener("mousedown", e => {
    dragging = true;
    startX = e.clientX - x;
    startY = e.clientY - y;
});

window.addEventListener("mouseup", () => dragging = false);

window.addEventListener("mousemove", e => {

    if(!dragging) return;

    x = e.clientX - startX;
    y = e.clientY - startY;

    update();
});

/* CLOSE POPUP */

window.addEventListener("click", e => {
    if(e.target.id === "popup"){
        document.getElementById("popup").style.display = "none";
    }
});

buildMarkers();
update();

</script>

</body>
</html>
