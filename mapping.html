<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Exclusion Zone Mapping</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Courier New", monospace;
}

body{
    overflow:hidden;
    background:black;
    color:#00ff88;
}

/* TOP BAR */

.topbar{
    position:fixed;
    top:0;
    left:0;
    width:100%;

    padding:12px 18px;
    border-bottom:1px solid #00ff88;
    background:rgba(0,0,0,0.9);
    z-index:1000;
}

/* MAP WRAPPER */

.map-container{
    width:100vw;
    height:100vh;
    overflow:hidden;
    position:relative;
    cursor:grab;
}

.map-container:active{
    cursor:grabbing;
}

/* MAP */

#map{
    position:absolute;
    top:50%;
    left:50%;
    transform-origin:center;
    width:1200px;
    user-select:none;
    -webkit-user-drag:none;
}

/* MARKERS */

.marker{
    position:absolute;
    width:10px;
    height:10px;
    border-radius:50%;
    transform:translate(-50%, -50%);
    cursor:pointer;
    z-index:10;
}

.marker::after{
    content: attr(data-title);
    position:absolute;
    top:-18px;
    left:50%;
    transform:translateX(-50%);
    font-size:10px;
    white-space:nowrap;
    color:#00ff88;
}

/* COLORS */

.green{ background:#00ff88; }
.red{ background:#ff3b3b; }
.yellow{ background:#ffd000; }
.black{ background:#222; border:1px solid #00ff88; }
.brown{ background:#8b5a2b; }
.white{ background:#ffffff; }

/* POPUP */

.popup{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    background:black;
    border:1px solid #00ff88;
    padding:20px;
    display:none;
    max-width:320px;
    z-index:2000;
}

.popup img{
    width:100%;
    margin-top:10px;
    border:1px solid #00ff88;
}

.popup a{
    display:block;
    margin-top:10px;
    color:#6ed6ff;
}

/* CONTROLS */

.controls{
    position:fixed;
    bottom:20px;
    right:20px;
    z-index:1000;
}

.controls button{
    width:45px;
    height:45px;
    margin:5px;
    border:1px solid #00ff88;
    background:black;
    color:#00ff88;
    font-size:20px;
}

/* SCANLINES */

.scanlines{
    position:fixed;
    inset:0;
    pointer-events:none;
    background:repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,0.03),
        rgba(255,255,255,0.03) 1px,
        transparent 1px,
        transparent 3px
    );
}

</style>
</head>

<body>

<div class="scanlines"></div>

<div class="topbar">
    EXCLUSION ZONE MAPPING
</div>

<div class="map-container" id="container">

    <img id="map" src="https://operator.coolsquad.xyz/u/luBi56.png">

    <!-- MARKERS -->

    <div class="marker green" style="left:496px; top:1218px;" data-title="Placid Wakes FOB"></div>

    <div class="marker red" style="left:594px; top:1195px;" data-title="Red Box"
        data-img="https://operator.coolsquad.xyz/u/RIghwK.png"
        data-link="artifact-001.html"></div>

    <div class="marker red" style="left:550px; top:373px;" data-title="The Monolith"
        data-img="https://operator.coolsquad.xyz/u/mH30lg.png"
        data-link="artifact-003.html"></div>

    <div class="marker yellow" style="left:690px; top:710px;" data-title="The Church"></div>

    <div class="marker black" style="left:750px; top:541px;" data-title="Black Prism"></div>

    <div class="marker brown" style="left:856px; top:573px;" data-title="AP Roots"></div>
    <div class="marker brown" style="left:758px; top:739px;" data-title="AP Roots"></div>
    <div class="marker brown" style="left:279px; top:627px;" data-title="AP Roots"></div>
    <div class="marker brown" style="left:831px; top:682px;" data-title="AP Roots"></div>

    <div class="marker white" style="left:739px; top:686px;" data-title="Newtons Triangle"></div>
    <div class="marker white" style="left:760px; top:643px;" data-title="Newtons Triangle"></div>
    <div class="marker white" style="left:812px; top:680px;" data-title="Newtons Triangle"></div>

</div>

<!-- POPUP -->

<div class="popup" id="popup">
    <div id="popupTitle"></div>
    <img id="popupImg" style="display:none;">
    <a id="popupLink" target="_blank"></a>
</div>

<div class="controls">
    <button onclick="zoomIn()">+</button>
    <button onclick="zoomOut()">-</button>
</div>

<script>

const map = document.getElementById("map");
const container = document.getElementById("container");

let scale = 1;
let x = 0;
let y = 0;
let dragging = false;
let sx, sy;

/* TRANSFORM */

function update(){
    map.style.transform =
        `translate(calc(-50% + ${x}px), calc(-50% + ${y}px)) scale(${scale})`;

    document.querySelectorAll(".marker").forEach(m => {
        m.style.transform = `translate(-50%, -50%) scale(${1/scale})`;
    });
}

/* ZOOM */

function zoomIn(){ scale += 0.1; update(); }
function zoomOut(){ scale = Math.max(0.2, scale - 0.1); update(); }

/* DRAG */

container.addEventListener("mousedown",(e)=>{
    dragging = true;
    sx = e.clientX - x;
    sy = e.clientY - y;
});

window.addEventListener("mouseup",()=>dragging=false);

window.addEventListener("mousemove",(e)=>{
    if(!dragging) return;
    x = e.clientX - sx;
    y = e.clientY - sy;
    update();
});

/* WHEEL ZOOM */

window.addEventListener("wheel",(e)=>{
    e.preventDefault();
    scale += e.deltaY < 0 ? 0.1 : -0.1;
    scale = Math.max(0.2, scale);
    update();
},{passive:false});

/* POPUPS */

const popup = document.getElementById("popup");
const title = document.getElementById("popupTitle");
const img = document.getElementById("popupImg");
const link = document.getElementById("popupLink");

document.querySelectorAll(".marker").forEach(m=>{
    m.addEventListener("click",()=>{

        title.innerText = m.dataset.title;

        if(m.dataset.img){
            img.src = m.dataset.img;
            img.style.display = "block";
        } else {
            img.style.display = "none";
        }

        if(m.dataset.link){
            link.href = m.dataset.link;
            link.innerText = "Open File";
        } else {
            link.removeAttribute("href");
            link.innerText = "";
        }

        popup.style.display = "block";
    });
});

popup.addEventListener("click",()=>{
    popup.style.display = "none";
});

update();

</script>

</body>
</html>
