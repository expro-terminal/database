<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Exclusion Zone Mapping</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    background:black;
    font-family:"Courier New", monospace;
    color:#00ff88;
}

/* TOP BAR */

.topbar{
    position:fixed;
    top:0;
    left:0;
    width:100%;

    padding:15px 20px;

    border-bottom:1px solid #00ff88;

    background:rgba(0,0,0,0.9);

    z-index:1000;
}

.topbar h1{
    font-size:24px;
    margin-bottom:5px;
}

.topbar p{
    color:#7dffb2;
    font-size:14px;
}

/* MAP CONTAINER */

.map-container{
    width:100vw;
    height:100vh;

    overflow:hidden;

    cursor:grab;

    position:relative;
}

.map-container:active{
    cursor:grabbing;
}

/* MAP IMAGE */

#map{
    position:absolute;

    top:50%;
    left:50%;

    transform:translate(-50%, -50%) scale(1);

    transform-origin:center center;

    user-select:none;
    -webkit-user-drag:none;

    max-width:none;

    width:1200px;
}

/* CONTROLS */

.controls{
    position:fixed;

    bottom:20px;
    right:20px;

    display:flex;
    flex-direction:column;

    gap:10px;

    z-index:1000;
}

.controls button{
    width:50px;
    height:50px;

    border:1px solid #00ff88;

    background:black;

    color:#00ff88;

    font-size:24px;

    cursor:pointer;

    transition:0.2s;
}

.controls button:hover{
    background:#00ff88;
    color:black;
}

/* BACK BUTTON */

.back{
    position:fixed;

    top:20px;
    right:20px;

    color:#00ff88;

    text-decoration:none;

    border:1px solid #00ff88;

    padding:10px 15px;

    z-index:1001;

    transition:0.2s;
}

.back:hover{
    background:#00ff88;
    color:black;
}

/* SCANLINES */

.scanlines{
    position:fixed;
    inset:0;

    pointer-events:none;

    background:
    repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,0.03),
        rgba(255,255,255,0.03) 1px,
        transparent 1px,
        transparent 3px
    );

    z-index:2000;
}

</style>
</head>

<body>

<div class="scanlines"></div>

<a href="index.html" class="back">
RETURN
</a>

<div class="topbar">

    <h1>EXCLUSION ZONE MAPPING</h1>

    <p>
        Interactive terrain and anomaly mapping interface.
    </p>

</div>

<div class="map-container" id="mapContainer">

    <img
        src="https://operator.coolsquad.xyz/u/luBi56.png"
        id="map"
        draggable="false"
    >

</div>

    <div class="popup" id="popup">
    <div id="popupText"></div>
    <img id="popupImg" style="display:none;">
    <div id="popupLink"></div>
    <button onclick="closePopup()">CLOSE</button>
</div>

<div class="controls">

    <button id="zoomIn">+</button>
    <button id="zoomOut">−</button>

</div>

<script>

const map = document.getElementById("map");
const container = document.getElementById("mapContainer");

const popup = document.getElementById("popup");
const popupText = document.getElementById("popupText");
const popupImg = document.getElementById("popupImg");
const popupLink = document.getElementById("popupLink");

let scale = 1;
let posX = 0;
let posY = 0;

let isDragging = false;
let startX;
let startY;

/* UPDATE MAP */
function updateMap(){
    map.style.transform =
        `translate(calc(-50% + ${posX}px), calc(-50% + ${posY}px)) scale(${scale})`;

    updateMarkers();
}

/* MARKERS DATA */

const markers = [
    {x:496, y:1218, color:"green", title:"Placid Wakes FOB"},

    {x:594, y:1195, color:"red", title:"Red Box",
        img:"https://operator.coolsquad.xyz/u/RIghwK.png",
        link:"artifact-001.html"
    },

    {x:550, y:373, color:"red", title:"The Monolith",
        img:"https://operator.coolsquad.xyz/u/mH30lg.png",
        link:"artifact-003.html"
    },

    {x:690, y:710, color:"yellow", title:"The Church"},

    {x:750, y:541, color:"black", title:"Black Prism"},

    {x:856, y:573, color:"brown", title:"AP Roots"},
    {x:758, y:739, color:"brown", title:"AP Roots"},
    {x:279, y:627, color:"brown", title:"AP Roots"},
    {x:831, y:682, color:"brown", title:"AP Roots"},

    {x:739, y:686, color:"white", title:"Newtons Triangle"},
    {x:760, y:643, color:"white", title:"Newtons Triangle"},
    {x:812, y:680, color:"white", title:"Newtons Triangle"},
];

/* CREATE MARKERS */

markers.forEach(m => {

    const el = document.createElement("div");
    el.className = `marker ${m.color}`;

    el.style.left = m.x + "px";
    el.style.top = m.y + "px";

    const label = document.createElement("div");
    label.className = "marker-label";
    label.innerText = m.title;

    el.appendChild(label);

    el.onclick = () => {

        popupText.innerHTML = `<h3>${m.title}</h3>`;

        popupImg.style.display = "none";
        popupLink.innerHTML = "";

        if(m.img){
            popupImg.src = m.img;
            popupImg.style.display = "block";
        }

        if(m.link){
            popupLink.innerHTML =
                `<br><a href="${m.link}">Open Document</a>`;
        }

        popup.style.display = "block";
    };

    map.parentElement.appendChild(el);

});

/* UPDATE MARKER POSITION WITH MAP */

function updateMarkers(){

    document.querySelectorAll(".marker").forEach(m => {

        const x = parseFloat(m.style.left);
        const y = parseFloat(m.style.top);

        m.style.transform =
            `translate(-50%, -50%) scale(${scale})`;

    });
}

/* POPUP */

function closePopup(){
    popup.style.display = "none";
}

/* ZOOM */

document.getElementById("zoomIn").onclick = () => {
    scale += 0.1;
    updateMap();
};

document.getElementById("zoomOut").onclick = () => {
    scale = Math.max(0.2, scale - 0.1);
    updateMap();
};

/* DRAG */

container.addEventListener("mousedown", (e) => {
    isDragging = true;
    startX = e.clientX - posX;
    startY = e.clientY - posY;
});

window.addEventListener("mouseup", () => {
    isDragging = false;
});

window.addEventListener("mousemove", (e) => {
    if(!isDragging) return;

    posX = e.clientX - startX;
    posY = e.clientY - startY;

    updateMap();
});

/* WHEEL ZOOM */

window.addEventListener("wheel", (e) => {

    e.preventDefault();

    scale += e.deltaY < 0 ? 0.1 : -0.1;

    scale = Math.max(0.2, scale);

    updateMap();

}, { passive:false });

updateMap();

function closePopup(){
    popup.style.display = "none";
}

</script>

</body>
</html>
