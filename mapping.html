<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Exclusion Zone Mapping</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    background:black;
    font-family:"Courier New", monospace;
    color:#00ff88;
}

/* TOP BAR */

.topbar{
    position:fixed;
    top:0;
    left:0;
    width:100%;

    padding:15px 20px;

    border-bottom:1px solid #00ff88;

    background:rgba(0,0,0,0.9);

    z-index:1000;
}

.topbar h1{
    font-size:24px;
    margin-bottom:5px;
}

.topbar p{
    color:#7dffb2;
    font-size:14px;
}

/* RETURN BUTTON */

.back{
    position:fixed;

    top:20px;
    right:20px;

    color:#00ff88;

    text-decoration:none;

    border:1px solid #00ff88;

    padding:10px 15px;

    z-index:2000;

    transition:0.2s;
}

.back:hover{
    background:#00ff88;
    color:black;
}

/* MAP AREA */

.map-container{
    width:100vw;
    height:100vh;

    overflow:hidden;

    position:relative;

    cursor:grab;
}

.map-container:active{
    cursor:grabbing;
}

/* MAP WRAPPER */

#mapWrapper{
    position:absolute;

    top:50%;
    left:50%;

    transform:
        translate(-50%, -50%)
        scale(1);

    transform-origin:center center;
}

/* MAP IMAGE */

#map{
    width:1200px;
    display:block;

    user-select:none;
    -webkit-user-drag:none;
}

/* MARKERS */

.marker{
    position:absolute;

    width:14px;
    height:14px;

    border-radius:50%;

    transform:translate(-50%, -50%);

    cursor:pointer;

    z-index:100;
}

/* LABELS */

.marker-label{
    position:absolute;

    top:-22px;
    left:50%;

    transform:translateX(-50%);

    font-size:12px;

    white-space:nowrap;

    text-shadow:0 0 5px black;
}

/* COLORS */

.green{ background:#00ff88; }
.red{ background:#ff2e2e; }
.yellow{ background:#ffe600; }
.black{ background:#111; border:1px solid #666; }
.white{ background:white; }

/* POPUP */

.popup{
    position:fixed;

    top:50%;
    left:50%;

    transform:translate(-50%, -50%);

    width:400px;
    max-width:90vw;

    background:#050505;

    border:1px solid #00ff88;

    padding:20px;

    z-index:5000;

    display:none;

    box-shadow:0 0 20px rgba(0,255,136,0.3);
}

.popup h2{
    margin-bottom:15px;
}

.popup img{
    width:100%;
    border:1px solid #00ff88;
    margin-bottom:15px;
}

.popup a{
    color:#6ed6ff;
}

.close-btn{
    margin-top:20px;

    background:black;
    color:#00ff88;

    border:1px solid #00ff88;

    padding:10px 15px;

    cursor:pointer;
}

/* ZOOM BUTTONS */

.controls{
    position:fixed;

    bottom:20px;
    right:20px;

    display:flex;
    flex-direction:column;

    gap:10px;

    z-index:2000;
}

.controls button{
    width:50px;
    height:50px;

    background:black;

    color:#00ff88;

    border:1px solid #00ff88;

    font-size:24px;

    cursor:pointer;
}

/* SCANLINES */

.scanlines{
    position:fixed;
    inset:0;

    pointer-events:none;

    background:
    repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,0.03),
        rgba(255,255,255,0.03) 1px,
        transparent 1px,
        transparent 3px
    );

    z-index:10000;
}

</style>
</head>

<body>

<div class="scanlines"></div>

<a href="index.html" class="back">
RETURN
</a>

<div class="topbar">

    <h1>EXCLUSION ZONE MAPPING</h1>

    <p>
        Interactive terrain and anomaly mapping interface.
    </p>

</div>

<div class="map-container" id="mapContainer">

    <div id="mapWrapper">

        <img
            src="https://operator.coolsquad.xyz/u/luBi56.png"
            id="map"
            draggable="false"
        >

        <!-- PLACID WAKES FOB -->

        <div
            class="marker green"
            style="left:496px; top:1218px;"
            onclick="openPopup('Placid Wakes FOB')"
        >
            <div class="marker-label">
                Placid Wakes FOB
            </div>
        </div>

        <!-- RED BOX -->

        <div
            class="marker red"
            style="left:592px; top:1230px;"
            onclick="openPopup(
                'Red Box',
                'https://operator.coolsquad.xyz/u/RIghwK.png',
                'artifact-001.html'
            )"
        >
            <div class="marker-label">
                Red Box
            </div>
        </div>

        <!-- MONOLITH -->

        <div
            class="marker red"
            style="left:550px; top:410px;"
            onclick="openPopup(
                'The Monolith',
                'https://operator.coolsquad.xyz/u/mH30lg.png',
                'artifact-003.html'
            )"
        >
            <div class="marker-label">
                The Monolith
            </div>
        </div>

        <!-- CHURCH -->

        <div
            class="marker yellow"
            style="left:690px; top:775px;"
            onclick="openPopup('The Church')"
        >
            <div class="marker-label">
                The Church
            </div>
        </div>

        <!-- BLACK PRISM -->

        <div
            class="marker black"
            style="left:750px; top:550px;"
            onclick="openPopup('Black Prism')"
        >
            <div class="marker-label">
                Black Prism
            </div>
        </div>

        <!-- NEWTONS TRIANGLE -->

        <div
            class="marker white"
            style="left:824px; top:725px;"
            onclick="openPopup('Newtons Triangle')"
        >
            <div class="marker-label">
                Newtons Triangle
            </div>
        </div>

        <div
            class="marker white"
            style="left:760px; top:675px;"
            onclick="openPopup('Newtons Triangle')"
        >
            <div class="marker-label">
                Newtons Triangle
            </div>
        </div>

        <div
            class="marker white"
            style="left:739px; top:713px;"
            onclick="openPopup('Newtons Triangle')"
        >
            <div class="marker-label">
                Newtons Triangle
            </div>
        </div>

    </div>

</div>

<!-- POPUP -->

<div class="popup" id="popup">

    <h2 id="popupTitle"></h2>

    <img id="popupImage" style="display:none;">

    <div id="popupLink"></div>

    <button class="close-btn" onclick="closePopup()">
        CLOSE
    </button>

</div>

<!-- CONTROLS -->

<div class="controls">

    <button id="zoomIn">+</button>
    <button id="zoomOut">−</button>

</div>

<script>

const wrapper = document.getElementById("mapWrapper");
const container = document.getElementById("mapContainer");

let scale = 1;
let posX = 0;
let posY = 0;

let dragging = false;

let startX;
let startY;

/* UPDATE MAP */

function updateMap(){

    wrapper.style.transform =
        `translate(calc(-50% + ${posX}px), calc(-50% + ${posY}px)) scale(${scale})`;
}

/* ZOOM */

document.getElementById("zoomIn").onclick = () => {

    scale += 0.1;

    updateMap();
};

document.getElementById("zoomOut").onclick = () => {

    scale -= 0.1;

    if(scale < 0.2){
        scale = 0.2;
    }

    updateMap();
};

/* DRAGGING */

container.addEventListener("mousedown", (e) => {

    dragging = true;

    startX = e.clientX - posX;
    startY = e.clientY - posY;
});

window.addEventListener("mouseup", () => {

    dragging = false;
});

window.addEventListener("mousemove", (e) => {

    if(!dragging) return;

    posX = e.clientX - startX;
    posY = e.clientY - startY;

    updateMap();
});

/* SCROLL ZOOM */

window.addEventListener("wheel", (e) => {

    e.preventDefault();

    if(e.deltaY < 0){

        scale += 0.1;

    } else {

        scale -= 0.1;

        if(scale < 0.2){
            scale = 0.2;
        }
    }

    updateMap();

}, { passive:false });

/* POPUP */

function openPopup(title, image=null, link=null){

    document.getElementById("popup").style.display = "block";

    document.getElementById("popupTitle").innerText = title;

    const img = document.getElementById("popupImage");

    if(image){

        img.src = image;
        img.style.display = "block";

    } else {

        img.style.display = "none";
    }

    const popupLink = document.getElementById("popupLink");

    if(link){

        popupLink.innerHTML =
        `<br><a href="${link}">
            Open Artifact File
        </a>`;

    } else {

        popupLink.innerHTML = "";
    }
}

function closePopup(){

    document.getElementById("popup").style.display = "none";
}

updateMap();

</script>

</body>
</html>
