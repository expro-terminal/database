<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ACCESS DENIED - ARTIFACT 001</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Courier New", monospace;
}

body{
    background:black;
    color:#00ff88;
    height:100vh;
    overflow:hidden;
}

/* SCANLINES */
.scanlines{
    position:fixed;
    inset:0;
    pointer-events:none;
    background:repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,0.03),
        rgba(255,255,255,0.03) 1px,
        transparent 1px,
        transparent 3px
    );
}

/* TERMINAL */
.terminal{
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    height:100vh;
    text-align:center;
    padding:20px;
}

/* GLITCH TITLE */
.title{
    font-size:28px;
    margin-bottom:20px;
    text-shadow:0 0 10px #00ff88;
}

/* WARNING BOX */
.box{
    border:1px solid #00ff88;
    padding:20px;
    max-width:600px;
    background:rgba(0,0,0,0.7);
}

.warning{
    color:#ff3b3b;
    margin-bottom:10px;
}

.small{
    margin-top:10px;
    font-size:14px;
    color:#7dffb2;
}

/* BUTTON */
a{
    display:inline-block;
    margin-top:20px;
    padding:10px 15px;
    border:1px solid #00ff88;
    color:#00ff88;
    text-decoration:none;
}

a:hover{
    background:#00ff88;
    color:black;
}

</style>
</head>

<body>

<div class="scanlines"></div>

<div class="terminal">

    <div class="title">PROJECT DARKSTATE ARCHIVE</div>

    <div class="box">

        <div class="warning">ACCESS DENIED</div>

        <div>ARTIFACT-001 CLASSIFIED FILE</div>

        <div class="small">
            You do not have sufficient clearance to view this record.<br>
            Clearance Level Required: EP6+
        </div>

        <a href="exclusionzonemapping.html">RETURN</a>

    </div>

</div>

</body>
</html>
